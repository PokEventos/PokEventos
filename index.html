  const AvaliacoesScreen = () => {
    const p = viewingProfile;
    const [avaliacoes,   setAvaliacoes]   = React.useState([]);
    const [minhaAval,    setMinhaAval]    = React.useState(null);
    const [loading,      setLoading]      = React.useState(true);
    const [showForm,     setShowForm]     = React.useState(false);
    const [nota,         setNota]         = React.useState(5);
    const [comentario,   setComentario]   = React.useState('');
    const [saving,       setSaving]       = React.useState(false);

    const loadAvaliacoes = async () => {
      if (!p?.user_id) { setLoading(false); return; }
      const { data } = await supabase.from('avaliacoes')
        .select('*, avaliador:avaliador_id(nome, avatar_url)')
        .eq('vendedor_id', p.user_id)
        .order('created_at', { ascending: false });
      if (data) {
        setAvaliacoes(data);
        const minha = data.find(av => av.avaliador_id === user?.id);
        if (minha) { setMinhaAval(minha); setNota(minha.nota); setComentario(minha.comentario||''); }
      }
      setLoading(false);
    };

    React.useEffect(() => { loadAvaliacoes(); }, [p?.user_id]);

    if (!p) return null;

    const isSelf     = user?.id === p.user_id;
    const media      = avaliacoes.length > 0 ? (avaliacoes.reduce((s,a) => s + a.nota, 0) / avaliacoes.length).toFixed(1) : null;
    const initials   = (p.nome||'?').charAt(0).toUpperCase();

    const renderStars = (n, size='text-base', interactive=false) =>
      [1,2,3,4,5].map(i => (
        <span key={i} onClick={interactive ? ()=>setNota(i) : undefined}
          className={`${size} ${interactive?'cursor-pointer':''} transition-all`}
          style={{filter: i<=n ? 'none' : 'grayscale(1) opacity(0.3)'}}>⭐</span>
      ));

    const handleSalvar = async () => {
      if (!user) { alert('Faça login para avaliar'); return; }
      setSaving(true);
      const payload = { vendedor_id: p.user_id, avaliador_id: user.id, nota, comentario: comentario.trim() };
      let err;
      if (minhaAval) {
        ({ error: err } = await supabase.from('avaliacoes').update({ nota, comentario: comentario.trim() }).eq('id', minhaAval.id));
      } else {
        ({ error: err } = await supabase.from('avaliacoes').insert(payload));
      }
      if (err) { alert('Erro: ' + err.message); }
      else { setShowForm(false); await loadAvaliacoes(); }
      setSaving(false);
    };

    // Distribuição de estrelas
    const dist = [5,4,3,2,1].map(n => ({
      n, count: avaliacoes.filter(a => a.nota === n).length
    }));

    return (
      <div className="min-h-screen bg-gray-50 flex flex-col pb-20">
        {/* Header */}
        <div className="bg-gradient-to-br from-gray-800 to-gray-900 pt-12 pb-6 px-4 relative">
          <button onClick={()=>setScreen('publicProfile')}
            className="absolute top-12 left-4 w-9 h-9 bg-white/20 hover:bg-white/30 rounded-full flex items-center justify-center text-white text-xl">
            ‹
          </button>
          <div className="flex flex-col items-center gap-2 mt-2">
            {p.avatar_url
              ? <img src={p.avatar_url} className="w-14 h-14 rounded-full object-cover border-2 border-yellow-400" />
              : <div className="w-14 h-14 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-2xl font-black text-white border-2 border-yellow-400">{initials}</div>
            }
            <p className="text-white font-black text-lg">{p.nome}</p>
            {media && (
              <div className="flex items-center gap-2">
                <span className="text-yellow-400 text-3xl font-black">{media}</span>
                <div className="flex flex-col gap-0.5">
                  <div className="flex">{renderStars(Math.round(parseFloat(media)), 'text-base')}</div>
                  <span className="text-white/60 text-xs text-center">{avaliacoes.length} avaliações</span>
                </div>
              </div>
            )}
          </div>
        </div>

        <div className="flex-1 p-4 space-y-4">

          {/* Distribuição de estrelas */}
          {avaliacoes.length > 0 && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-2">
              {dist.map(({n, count}) => (
                <div key={n} className="flex items-center gap-2">
                  <span className="text-xs font-bold text-gray-500 w-4">{n}</span>
                  <span className="text-xs">⭐</span>

  const PublicProfileScreen = () => {
    const p = viewingProfile;
    const [vitrineCards,  setVitrineCards]  = React.useState([]);
    const [avaliacoes,    setAvaliacoes]    = React.useState([]);
    const [minhaAval,     setMinhaAval]     = React.useState(null); // avaliação do user logado
    const [loading,       setLoading]       = React.useState(true);
    const [showAvalForm,  setShowAvalForm]  = React.useState(false);
    const [nota,          setNota]          = React.useState(5);
    const [comentario,    setComentario]    = React.useState('');
    const [saving,        setSaving]        = React.useState(false);

    const loadData = async () => {
      if (!p?.user_id) { setLoading(false); return; }
      const [v, a] = await Promise.all([
        supabase.from('vitrine').select('*').eq('user_id', p.user_id).eq('ativo', true).order('created_at', { ascending: false }),
        supabase.from('avaliacoes').select('*, avaliador:avaliador_id(nome, avatar_url)').eq('vendedor_id', p.user_id).order('created_at', { ascending: false })
      ]);
      if (v.data) setVitrineCards(v.data);
      if (a.data) {
        setAvaliacoes(a.data);
        const minha = a.data.find(av => av.avaliador_id === user?.id);
        if (minha) { setMinhaAval(minha); setNota(minha.nota); setComentario(minha.comentario||''); }
      }
      setLoading(false);
    };

    React.useEffect(() => { loadData(); }, [p?.user_id]);

    // Tenta recuperar do localStorage se viewingProfile for null
    React.useEffect(() => {
      if (!viewingProfile) {
        const saved = localStorage.getItem('agenda-pokemon-viewing-profile');
        if (saved) {
          try { setViewingProfile(JSON.parse(saved)); } catch(e) {}
        } else {
          setScreen('vitrine');
        }
      }
    }, []);

    if (!p) return (
      <div className="min-h-screen flex items-center justify-center bg-gray-50">
        <p className="text-gray-400 text-sm">Carregando perfil...</p>
      </div>
    );

    const initials    = (p.nome||'?').charAt(0).toUpperCase();
    const isSelf      = user?.id === p.user_id;
    const mediaNotas  = avaliacoes.length > 0 ? (avaliacoes.reduce((s,a) => s + a.nota, 0) / avaliacoes.length).toFixed(1) : null;

    const renderStars = (n, size='text-base', interactive=false) =>

    const handleSalvarAval = async () => {
      if (!user) { alert('Faça login para avaliar'); return; }
      setSaving(true);
      const payload = { vendedor_id: p.user_id, avaliador_id: user.id, nota, comentario: comentario.trim() };
      let err;
      if (minhaAval) {
        ({ error: err } = await supabase.from('avaliacoes').update({ nota, comentario: comentario.trim() }).eq('id', minhaAval.id));
      } else {
        ({ error: err } = await supabase.from('avaliacoes').insert(payload));
      }
      if (err) { alert('Erro ao salvar: ' + err.message); }
      else { setShowAvalForm(false); await loadData(); }
      setSaving(false);

    return (
      <div className="min-h-screen bg-gray-50 flex flex-col pb-20">
        {/* Header */}
        <div className="bg-gradient-to-br from-gray-800 to-gray-900 pt-12 pb-8 px-4 relative">
          <button onClick={()=>setScreen('vitrine')}
            className="absolute top-12 left-4 w-9 h-9 bg-white/20 hover:bg-white/30 rounded-full flex items-center justify-center text-white text-xl">
            ‹
          </button>
          <button onClick={() => {

              navigator.clipboard.writeText(url);
              alert('🔗 Link copiado! ' + url);

            🔗
          </button>
          <div className="flex flex-col items-center gap-3 mt-2">
            {p.avatar_url
              ? <img src={p.avatar_url} className="w-24 h-24 rounded-full object-cover border-4 border-yellow-400 shadow-xl" />
              : <div className="w-24 h-24 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-5xl font-black text-white border-4 border-yellow-400 shadow-xl">{initials}</div>
            }
            <div className="text-center">
              <h1 className="text-2xl font-black text-white">{p.nome}</h1>
              <span className={`text-xs font-bold px-3 py-1 rounded-full mt-1 inline-block ${p.tipo==='leiloeiro' ? 'bg-yellow-400 text-gray-900' : 'bg-white/20 text-white'}`}>
                {p.tipo==='leiloeiro' ? '🏷️ Leiloeiro' : '👤 Participante'}
              </span>
            </div>
            {/* Score resumido */}
            {mediaNotas && (
              <div className="flex items-center gap-2 bg-white/10 rounded-2xl px-4 py-2">
                <span className="text-yellow-400 text-xl font-black">{mediaNotas}</span>
                <div className="flex">{renderStars(Math.round(parseFloat(mediaNotas)))}</div>
                <span className="text-white/60 text-xs">({avaliacoes.length} avaliações)</span>
              </div>
            )}
            {p.whatsapp && (
              <a href={`https://wa.me/${p.whatsapp.replace(/\D/g,'')}`} target="_blank"
                className="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white font-bold px-5 py-2.5 rounded-2xl text-sm shadow-lg transition-all">
                💬 Falar no WhatsApp
              </a>
            )}
          </div>
        </div>

        <div className="flex-1 p-4 space-y-5">

          {/* ── Avaliações — card resumo ── */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
            <div className="flex items-center justify-between">
              <div>
                <h2 className="font-black text-gray-800 text-base">⭐ Avaliações</h2>
                {loading ? (
                  <p className="text-xs text-gray-400 mt-0.5">Carregando...</p>
                ) : avaliacoes.length === 0 ? (
                  <p className="text-xs text-gray-400 mt-0.5">Nenhuma avaliação ainda</p>
                ) : (
                  <div className="flex items-center gap-2 mt-1">
                    <span className="text-2xl font-black text-yellow-500">{mediaNotas}</span>
                    <div className="flex">{renderStars(Math.round(parseFloat(mediaNotas)), 'text-sm')}</div>
                    <span className="text-xs text-gray-400">({avaliacoes.length})</span>
                  </div>
                )}
              </div>
              <div className="flex flex-col gap-2 items-end">
                {!isSelf && user && (
                  <button onClick={()=>setShowAvalForm(v=>!v)}
                    className="text-xs font-bold bg-purple-100 text-purple-700 px-3 py-1.5 rounded-xl hover:bg-purple-200 transition-all">
                    {minhaAval ? '✏️ Editar' : '+ Avaliar'}
                  </button>
                )}
                {avaliacoes.length > 0 && (
                  <button onClick={()=>setScreen('avaliacoes')}
                    className="text-xs font-bold bg-gray-100 text-gray-600 px-3 py-1.5 rounded-xl hover:bg-gray-200 transition-all">
                    Ver todas →
                  </button>
                )}
              </div>
            </div>

            {/* Formulário de avaliação */}
            {showAvalForm && (
              <div className="bg-purple-50 border border-purple-200 rounded-2xl p-4 mt-4 space-y-3">
                <p className="text-sm font-bold text-purple-800">Sua avaliação para {p.nome}:</p>
                <div className="flex gap-1">{renderStars(nota, 'text-2xl', true)}</div>
                <textarea value={comentario} onChange={e=>setComentario(e.target.value)}

                  rows={3} />
                <div className="flex gap-2">
                  <button onClick={handleSalvarAval} disabled={saving}
                    className="flex-1 bg-purple-600 text-white font-bold py-2.5 rounded-xl text-sm disabled:opacity-50 hover:bg-purple-700 transition-all">

                  <button onClick={()=>setShowAvalForm(false)}
                    className="px-4 py-2.5 bg-gray-100 text-gray-600 font-bold rounded-xl text-sm hover:bg-gray-200">
                    Cancelar
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* ── Cartas na vitrine ── */}
          <div>
            <h2 className="font-black text-gray-800 text-base mb-3">
              🏪 Cartas na Vitrine {!loading && <span className="text-gray-400 font-normal text-sm">({vitrineCards.length})</span>}
            </h2>
            {vitrineCards.length === 0 ? (
              <div className="text-center py-8 text-gray-400">
                <p className="text-4xl mb-2">🎴</p>
                <p className="text-sm">Nenhuma carta na vitrine</p>
              </div>
            ) : (
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                {vitrineCards.map(c => {

                  const vCard = { id: c.card_id||c.id, name: c.name, set: c.set_name||'', number: c.number, img: c.img_url, images: { small: c.img_url, large: c.img_url } };
                  return (

  {gradeBadge(c)}

        <BottomNav current="vitrine" />

  /* ════════════════════════════════════════

  const MinhaVitrineScreen = () => {
    const QUALITIES_MV = ['M','NM','SP','MP','HP','D'];
    const [myCards,   setMyCards]   = React.useState([]);
    const [loading,   setLoading]   = React.useState(true);
    const [expanded,  setExpanded]  = React.useState(null);
    const [mvPage,    setMvPage]    = React.useState(0);
    const [mvSort,    setMvSort]    = React.useState('recente'); // 'recente' | 'preco_desc' | 'preco_asc'
    const [editing,   setEditing]   = React.useState(null); // { id, price, quality, language, comment }
    const [saving,    setSaving]    = React.useState(false);

    React.useEffect(() => { loadMyCards(); }, []);

    const loadMyCards = async () => {
      setLoading(true);
      try {
        const { data, error } = await supabase
          .from('vitrine')
          .select('*')
          .eq('user_id', user.id)
          .eq('ativo', true)
          .order('created_at', { ascending: false });
        if (!error && data) setMyCards(data);
      } catch(e) {}
      setLoading(false);
    };

    const startEdit = (c) => setEditing({ id: c.id, name: c.name || '', price: String(c.price), quality: c.quality, language: c.language || 'BR', comment: c.comment || '', imgUploading: false });

    const handleSave = async () => {
      if (!editing.price) { alert('Informe o preço'); return; }
      setSaving(true);
      const updatePayload = {
        name:     editing.name.trim() || undefined,
        price:    parseFloat(editing.price),
        quality:  editing.quality,
        language: editing.language,
        comment:  editing.comment,
      };
      if (editing.newImgUrl) updatePayload.img_url = editing.newImgUrl;
      const { error } = await supabase.from('vitrine').update(updatePayload).eq('id', editing.id).eq('user_id', user.id);
      if (error) { alert('Erro ao salvar: ' + error.message); }
      else {
        setMyCards(p => p.map(c => c.id === editing.id ? { ...c, ...updatePayload } : c));
        setEditing(null);
      }
      setSaving(false);
    };

    const handleDelete = async (id) => {
      if (!confirm('Remover esta carta da vitrine?')) return;
      const { error } = await supabase.from('vitrine').update({ ativo: false }).eq('id', id).eq('user_id', user.id);
      if (!error) { setMyCards(p => p.filter(c => c.id !== id)); setEditing(null); }
    };

    return (
      <div className="min-h-screen bg-gray-50 pb-24">
        {/* Header */}
        <div className="sticky top-0 z-20 bg-gradient-to-r from-orange-400 to-yellow-500 text-white p-5 pb-8 relative overflow-hidden">
          <div className="absolute -right-4 -bottom-4 text-8xl opacity-10">🏪</div>
          <div className="flex justify-between items-start relative z-10">
            <div>
              <button onClick={()=>setScreen('profile')} className="text-white/70 text-xs mb-2 flex items-center gap-1 hover:text-white">← Perfil</button>
              <h1 className="text-2xl font-black" style={{fontFamily:'Arial Black,sans-serif'}}>Minha Vitrine</h1>
              <p className="text-orange-100 text-sm mt-0.5">{myCards.length} carta{myCards.length !== 1 ? 's' : ''} à venda</p>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => {
                const url = window.location.origin + window.location.pathname + '?vitrine=' + user.id;
                if (navigator.share) {
                  navigator.share({ title: 'Minha Vitrine — Agenda Pokémon', text: 'Veja as cartas que tenho à venda!', url });
                } else {
                  navigator.clipboard.writeText(url);
                  alert('🔗 Link copiado! ' + url);
                }
              }} className="flex items-center gap-1.5 bg-white/20 hover:bg-white/30 text-white font-bold px-3 py-2 rounded-xl text-sm transition-all">
                🔗 Compartilhar
              </button>
              <ProfileBtn />
            </div>
          </div>
        </div>

        <div className="px-4 -mt-4 space-y-3 pt-2">
          {/* Botão ir para vitrine postar */}
          <button onClick={()=>setScreen('vitrine')}
            className="w-full py-3 bg-gray-800 text-white rounded-2xl font-black text-sm flex items-center justify-center gap-2 hover:bg-gray-700 transition-all shadow-md">
            ＋ Postar Nova Carta
          </button>

          {loading ? (
            <div className="text-center py-16">
              <div className="text-4xl mb-3 animate-bounce">🏪</div>
              <p className="text-gray-400">Carregando...</p>
            </div>
          ) : myCards.length === 0 ? (
            <div className="bg-white rounded-2xl shadow-md p-8 text-center">
              <p className="text-5xl mb-3">🎴</p>
              <p className="font-bold text-gray-700 mb-1">Nenhuma carta na vitrine</p>
              <p className="text-sm text-gray-400 mb-4">Publique cartas para vender!</p>
              <button onClick={()=>setScreen('vitrine')} className="bg-orange-500 text-white px-6 py-2 rounded-xl font-bold text-sm">
                Ir para a Vitrine
              </button>
            </div>
          ) : (() => {
            const PER_PAGE = 15;
            const sortedCards = [...myCards].sort((a,b) => {
              if (mvSort === 'preco_desc') return Number(b.price) - Number(a.price);
              if (mvSort === 'preco_asc')  return Number(a.price) - Number(b.price);
              return 0; // 'recente' — já vem ordenado do banco
            });
            const totalPages = Math.ceil(sortedCards.length / PER_PAGE);
            const pageCards  = sortedCards.slice(mvPage * PER_PAGE, (mvPage + 1) * PER_PAGE);
            const selCard    = sortedCards.find(x => x.id === expanded);
            return (
              <>
                {/* Ordenação */}
                <div className="flex gap-2">
                  {[
                    { key: 'recente',    label: '🕐 Recentes' },
                    { key: 'preco_desc', label: '💰 Maior preço' },
                    { key: 'preco_asc',  label: '💸 Menor preço' },
                  ].map(opt => (
                    <button key={opt.key}
                      onClick={()=>{ setMvSort(opt.key); setMvPage(0); setExpanded(null); }}
                      className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${mvSort===opt.key?'bg-yellow-400 text-gray-900 shadow-md':'bg-white text-gray-500 border border-gray-200 hover:border-yellow-300'}`}>
                      {opt.label}

                  ))}

                  <div className="flex items-center justify-between bg-white rounded-2xl px-4 py-2.5 shadow-sm border border-gray-100">
                    <button onClick={()=>{setMvPage(p=>Math.max(0,p-1));setExpanded(null);}} disabled={mvPage===0}

                    <p className="text-xs font-bold text-gray-500">Página {mvPage+1} / {totalPages} · {myCards.length} cartas</p>
                    <button onClick={()=>{setMvPage(p=>Math.min(totalPages-1,p+1));setExpanded(null);}} disabled={mvPage===totalPages-1}
                      className="w-8 h-8 rounded-xl bg-gray-100 hover:bg-gray-200 disabled:opacity-30 font-black text-gray-600">›</button>
                  </div>
                )}

                {/* Grade 5×3 */}
                <div className="bg-white rounded-2xl shadow-md p-3 border border-gray-100">
                  <div className="grid grid-cols-5 gap-1.5">
                    {pageCards.map(c => (
                      <div key={c.id} onClick={()=>setExpanded(expanded===c.id?null:c.id)}
                        className={`relative cursor-pointer transition-all active:scale-95 ${expanded===c.id?'opacity-100 scale-105':'opacity-90 hover:opacity-100'}`}>
                        <GradedSlab c={c} sidebar={true}>
                          <div className="relative">
                            {c.img_url
                              ? <img src={c.img_url} className="w-full aspect-[63/88] object-contain bg-gray-50" />
                              : <div className="w-full aspect-[63/88] bg-gray-100 flex items-center justify-center text-xl">🎴</div>
                            }
                            {!c.graded && gradeBadge(c)}
                            {c.language && (
                              <img src={`https://flagcdn.com/w40/${langFlag(c.language)}.png`}
                                className="absolute top-0.5 right-0.5 w-4 h-2.5 rounded object-cover shadow" />
                            )}
                          </div>
                        </GradedSlab>
                        <div className="bg-black/70 px-0.5 py-0.5 text-center rounded-b">
                          <p className="text-white text-[8px] font-black leading-tight">R${Number(c.price).toFixed(0)}</p>
                        </div>
                      </div>
                    ))}
                    {Array.from({length: PER_PAGE - pageCards.length}).map((_,i) => (
                      <div key={'empty-'+i} className="w-full aspect-[63/88] rounded-xl bg-gray-50 border border-dashed border-gray-100" />
                    ))}
                  </div>
                </div>

                {/* Paginação pontos */}
                {totalPages > 1 && (
                  <div className="flex items-center justify-center gap-1.5">
                    {Array.from({length: totalPages}).map((_,i) => (
                      <button key={i} onClick={()=>{setMvPage(i);setExpanded(null);}}
                        className={`rounded-full transition-all ${mvPage===i?'w-5 h-2 bg-yellow-400':'w-2 h-2 bg-gray-200 hover:bg-gray-300'}`} />
                    ))}
                  </div>
                )}

                {/* Detalhe / edição da carta selecionada */}
                {selCard && (
                  <div className="bg-white rounded-2xl shadow-md border-2 border-yellow-300 overflow-hidden">
                    <div className="flex items-center gap-3 p-3 border-b border-gray-100">
                      {selCard.img_url && <img src={selCard.img_url} className="h-24 w-auto object-contain rounded-xl border border-gray-100 flex-shrink-0" />}
                      <div className="flex-1 min-w-0">
                        <p className="font-black text-gray-800 text-sm">{selCard.name}</p>
                        <p className="text-xs text-gray-400">{selCard.set_name}{selCard.number ? ' · ' + selCard.number : ''}</p>
                        <div className="flex items-center gap-2 mt-1 flex-wrap">
                          {selCard.graded
                            ? <span style={{background:'linear-gradient(135deg,#1a1a2e,#16213e)',border:'1px solid #f5c518'}} className="text-[10px] font-black text-yellow-400 px-1.5 py-0.5 rounded">🏆 {selCard.grade_value || ''}</span>
                            : <span className={`text-[10px] font-black text-white px-1.5 py-0.5 rounded ${QUALITY_COLOR[selCard.quality]||'bg-gray-400'}`}>{selCard.quality}</span>
                          }
                          {selCard.language && <img src={`https://flagcdn.com/w40/${langFlag(selCard.language)}.png`} className="w-5 h-3.5 rounded object-cover shadow" />}
                          <span className="font-black text-green-600">R$ {Number(selCard.price).toFixed(2)}</span>
                        </div>
                        {selCard.comment && <p className="text-xs text-gray-500 mt-1 italic">"{selCard.comment}"</p>}
                      </div>
                      <button onClick={()=>setExpanded(null)} className="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 flex-shrink-0">✕</button>
                    </div>

                    <div className="p-3">
                      {editing?.id !== selCard.id ? (
                        <div className="flex gap-2">
                          <button onClick={()=>startEdit(selCard)}
                            className="flex-1 py-2.5 bg-blue-500 hover:bg-blue-600 text-white font-black rounded-xl text-sm">✏️ Editar</button>
                          <button onClick={()=>handleDelete(selCard.id)}
                            className="flex-1 py-2.5 bg-red-500 hover:bg-red-600 text-white font-black rounded-xl text-sm">🗑️ Remover</button>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {/* Nome */}
                          <div>
                            <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Nome da carta</label>
                            <input value={editing.name} onChange={e=>setEditing(p=>({...p,name:e.target.value}))}
                              placeholder="Ex: Charizard ex"
                              className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl text-sm outline-none focus:border-blue-400" />
                          </div>
                          {/* Foto */}
                          <div>
                            <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Foto da carta</label>
                            <div className="flex items-center gap-2 flex-wrap">
                              {editing.imgUploading
                                ? <span className="text-xs text-gray-400 font-bold">⏳ Enviando...</span>
                                : <>
                                    <label className="inline-flex items-center gap-1 px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-300 rounded-xl cursor-pointer text-xs font-bold">
                                      📷 Câmera
                                      <input type="file" accept="image/*" capture="environment" className="hidden"
                                        onChange={async e => {
                                          const file = e.target.files?.[0]; if (!file) return;
                                          setEditing(p=>({...p,imgUploading:true}));
                                          try {
                                            const ext = file.name.split('.').pop();
                                            const fileName = 'vitrine-'+user.id+'-'+Date.now()+'.'+ext;
                                            const {error:upErr} = await supabase.storage.from('vitrine').upload(fileName,file,{upsert:true});
                                            if (upErr) throw new Error(upErr.message);
                                            const {data:urlData} = supabase.storage.from('vitrine').getPublicUrl(fileName);
                                            setEditing(p=>({...p,newImgUrl:urlData.publicUrl,imgUploading:false}));
                                          } catch(err) { alert('Erro: '+err.message); setEditing(p=>({...p,imgUploading:false})); }
                                        }} />
                                    </label>
                                    <label className="inline-flex items-center gap-1 px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-300 rounded-xl cursor-pointer text-xs font-bold">
                                      🖼️ Galeria
                                      <input type="file" accept="image/*" className="hidden"
                                        onChange={async e => {
                                          const file = e.target.files?.[0]; if (!file) return;
                                          setEditing(p=>({...p,imgUploading:true}));
                                          try {
                                            const ext = file.name.split('.').pop();
                                            const fileName = 'vitrine-'+user.id+'-'+Date.now()+'.'+ext;
                                            const {error:upErr} = await supabase.storage.from('vitrine').upload(fileName,file,{upsert:true});
                                            if (upErr) throw new Error(upErr.message);
                                            const {data:urlData} = supabase.storage.from('vitrine').getPublicUrl(fileName);
                                            setEditing(p=>({...p,newImgUrl:urlData.publicUrl,imgUploading:false}));
                                          } catch(err) { alert('Erro: '+err.message); setEditing(p=>({...p,imgUploading:false})); }
                                        }} />
                                    </label>
                                  </>
                              }
                              {editing.newImgUrl && (
                                <>
                                  <img src={editing.newImgUrl} className="h-10 w-auto rounded-lg border border-gray-200 object-contain" />
                                  <button onClick={()=>setEditing(p=>({...p,newImgUrl:null}))} className="w-6 h-6 bg-red-50 text-red-400 rounded-full flex items-center justify-center text-xs">✕</button>
                                </>
                              )}
                            </div>
                          </div>
                          <div>
                            <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Qualidade</label>
                            <div className="flex gap-1.5 flex-wrap">
                              {QUALITIES_MV.map(q => (
                                <button key={q} onClick={()=>setEditing(p=>({...p,quality:q}))}
                                  className={`px-3 py-1.5 rounded-lg text-xs font-black border-2 transition-all ${editing.quality===q?`${QUALITY_COLOR[q]} text-white border-transparent`:'bg-white text-gray-500 border-gray-200'}`}>{q}</button>
                              ))}
                            </div>
                          </div>
                          <div>
                            <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Idioma</label>
                            <div className="flex items-center gap-2 flex-wrap">
                              {[{code:'BR',img:'https://flagcdn.com/w40/br.png'},{code:'EN',img:'https://flagcdn.com/w40/us.png'},{code:'JP',img:'https://flagcdn.com/w40/jp.png'}].map(({code,img})=>(
                                <button key={code} onClick={()=>setEditing(p=>({...p,language:code}))}
                                  className={`w-10 h-10 rounded-xl border-2 flex items-center justify-center overflow-hidden transition-all ${editing.language===code?'border-gray-800 shadow-md scale-110':'border-gray-200 opacity-40 hover:opacity-80'}`}>
                                  <img src={img} className="w-full h-full object-cover" />
                                </button>
                              ))}
                              <select value={['BR','EN','JP'].includes(editing.language)?'':editing.language}
                                onChange={e=>{if(e.target.value) setEditing(p=>({...p,language:e.target.value}));}}
                                className="h-10 pl-2 pr-6 rounded-xl border-2 border-gray-200 text-xs appearance-none cursor-pointer">
                                <option value="">Outros</option>
                                <option value="CN">🇨🇳 China</option>
                                <option value="KR">🇰🇷 Coreia</option>
                                <option value="DE">🇩🇪 Alemanha</option>
                                <option value="FR">🇫🇷 França</option>
                                <option value="IT">🇮🇹 Itália</option>
                                <option value="ES">🇪🇸 Espanha</option>
                                <option value="PT">🇵🇹 Portugal</option>
                              </select>
                            </div>
                          </div>
                          <div className="flex gap-2">
                            <div className="flex-1">
                              <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Preço (R$)</label>
                              <input value={editing.price} onChange={e=>setEditing(p=>({...p,price:e.target.value}))}
                                type="number" placeholder="Ex: 150"
                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl text-sm outline-none focus:border-blue-400" />
                            </div>
                            <div className="flex-1">
                              <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Observação</label>
                              <input value={editing.comment} onChange={e=>setEditing(p=>({...p,comment:e.target.value}))}
                                placeholder="Ex: PSA 9"
                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl text-sm outline-none focus:border-blue-400" />
                            </div>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={()=>setEditing(null)}
                              className="flex-1 py-2.5 bg-gray-200 text-gray-700 font-black rounded-xl text-sm">Cancelar</button>
                            <button onClick={handleSave} disabled={saving}
                              className="flex-1 py-2.5 bg-blue-500 text-white font-black rounded-xl text-sm disabled:opacity-50">
                              {saving ? '⏳ Salvando…' : '✅ Salvar'}
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </>
            );
          })()}
        </div>
        <BottomNav current="profile" />
      </div>
    );
  };

  /* ─── ROTEAMENTO ─── */
  if (loading) {
    return (
      <div className="w-full h-screen flex items-center justify-center bg-gradient-to-br from-red-500 via-yellow-400 to-blue-500">
        <div className="text-center">
          <img src={POKE.pikachu} className="w-24 h-24 mx-auto mb-4 animate-bounce" />
          <p className="text-white text-xl font-black">Carregando Agenda Pokémon...</p>
        </div>
      </div>
    );
  }

  // Se não está logado, mostrar apenas login/register
  if (!user && screen !== 'register' && screen !== 'redefinirSenha') {
    return <LoginScreen />;
  }

  return (
    <div className="w-full min-h-screen">
      {showTutorial && <TutorialModal />}
      {/* ── Modal de lembrete pós check-in ── */}
      {screen==='login'      && <LoginScreen />}
      {screen==='redefinirSenha' && <RedefinirSenhaScreen />}
      {screen==='register'   && <RegisterScreen />}
      {screen==='home'       && <HomeScreen />}
      {screen==='calendar'   && <CalendarScreen />}
      {screen==='search'     && <SearchWantedScreen />}
      {screen==='wishlist'    && <WishlistScreen />}
      {screen==='wanted'     && <SearchWantedScreen />}
      {screen==='auctioneer' && <AuctioneerScreen editingAuction={editingAuction} />}
      {screen==='meusLeiloes' && <MeusLeloesScreen />}
      {screen==='admin'      && <AdminScreen />}
      {screen==='profile'    && <ProfileScreen />}
      {screen==='vitrine'    && <VitrineScreen />}
      {screen==='minhaVitrine' && <MinhaVitrineScreen />}
      {screen==='publicProfile' && <PublicProfileScreen />}
      {screen==='avaliacoes'    && <AvaliacoesScreen />}
      {modalLembrete && <ModalLembrete event={modalLembrete.event} onClose={()=>setModalLembrete(null)} toggleLembrete={toggleLembrete} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
      // Ouvir mensagens do SW — abrir leilão direto quando clicar na notificação
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data && e.data.type === 'OPEN_AUCTION' && e.data.auctionId) {
          // Dispara evento customizado que o App vai ouvir
          window.dispatchEvent(new CustomEvent('open-auction', { detail: { auctionId: e.data.auctionId } }));
        }
      });
    }
  </script>
</body>
