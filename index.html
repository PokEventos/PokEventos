/* ─── UTIL: verifica se carta wanted aparece em leilão ─── */
const matchWanted = (wantedCard, eventCard) => {
  // MATCH POR ID EXATO (mais confiável)
  const wId = (wantedCard.id || '').trim();
  const eId = (eventCard.id  || '').trim();
  if (wId && eId && wId === eId) return true;

  const wName = wantedCard.name.toLowerCase().trim();
  const eName = eventCard.name.toLowerCase().trim();

  // Nome tem que ser EXATAMENTE igual
  if (!wName || !eName || wName !== eName) return false;

  const wNum = (wantedCard.number || wantedCard.localId || '').toLowerCase().trim();
  const eNum = (eventCard.number  || eventCard.localId  || '').toLowerCase().trim();

  // Set: tenta setId primeiro, depois set como string
  const wSet = (wantedCard.setId || wantedCard.set?.id || (typeof wantedCard.set==='string' ? wantedCard.set : wantedCard.set?.name) || '').toLowerCase().trim();
  const eSet = (eventCard.setId  || eventCard.set?.id  || (typeof eventCard.set==='string'  ? eventCard.set  : eventCard.set?.name)  || '').toLowerCase().trim();

  // Precisa de nome + número + set todos coincidindo
  if (wNum && eNum && wNum === eNum && wSet && eSet && wSet === eSet) return true;

  // Se não tiver set disponível: nome + número completo (com "/")
  if (wNum && eNum && wNum === eNum && wNum.includes('/')) return true;

  return false;
};

/* Busca instantânea na base local */
const searchLocalCards = (query) => {
  if (!query.trim()) return [];
  const q = query.toLowerCase().trim();
  return LOCAL_CARDS.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.number.toLowerCase().includes(q) ||
    (c.set?.name || '').toLowerCase().includes(q) ||
    (c.rarity || '').toLowerCase().includes(q)
  ).slice(0, 20);
};

/* ─── CONSTANTES GLOBAIS ─── */
const dataRelativa = (dateStr) => {
  const hoje  = new Date(); hoje.setHours(0,0,0,0);
  const amanha = new Date(hoje); amanha.setDate(hoje.getDate()+1);
  const d = new Date(dateStr + 'T00:00:00'); d.setHours(0,0,0,0);
  const diff = Math.round((d - hoje) / 86400000);
  if (diff === 0) return { label: 'Hoje',    color: 'text-green-600' };
  if (diff === 1) return { label: 'Amanhã',  color: 'text-blue-600'  };
  if (diff === -1) return { label: 'Ontem',  color: 'text-gray-400'  };
  if (diff < 0)   return { label: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), color: 'text-gray-400' };
  if (diff <= 6)  return { label: d.toLocaleDateString('pt-BR',{weekday:'long'}), color: 'text-purple-600' };
  return { label: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), color: 'text-gray-700' };
};

  // Componente GradedSlab — envolve a imagem num slab estilo PSA/BGS
  const GradedSlab = ({ c, children, sidebar=false }) => {
    if (!c.graded) return <>{children}</>;
    const nota = c.grade_value || c.gradeValue || '';
    // Cor progressiva: 10=ouro puro, 9.5=ouro claro, 9=prata, 8.5=prata escuro, 8=bronze claro, resto=bronze
    const notaColor =
      nota==='10'   ? '#FFD700' :

      nota==='9'    ? '#E8E8E8' :

      nota==='8'    ? '#E8B86D' :

      nota==='6'    ? '#B87333' :
      nota==='AUTH' ? '#7EC8E3' :

      nota==='10'   ? '0 0 6px rgba(255,215,0,0.8)' :

                      'none';

    const topFontSize   = sidebar ? '5px' : '8px';

        borderRadius:'6px',

        background:'linear-gradient(145deg,#c8a84b,#f5e27a,#c8a84b,#8b6914)',

   TCGDEX — funções compartilhadas (globais)
   Usadas em SearchWantedScreen e AuctioneerScreen
═══════════════════════════════════════════════ */
const TCGDEX_API    = 'https://api.tcgdex.net/v2/en/cards';
const TCGDEX_API_PT = 'https://api.tcgdex.net/v2/pt-br/cards';

const normalizeTcgdex = (c, namePt) => ({
  id:     c.id,
  name:   namePt || c.name,          // nome PT-BR quando disponível
  nameEn: c.name,                    // nome EN sempre preservado
  namePt: namePt || null,
  number: c.localId || '',
  rarity: c.rarity || '',
  set:    { name: getSetName(
              (c.set && c.set.id) || c.id.split('-').slice(0,-1).join('-'),
              (c.set && c.set.name) || null
            ) },
  images: { small: c.image ? c.image + '/low.png' : '', large: c.image ? c.image + '/high.png' : '' },
});

const PROMO_SETS = {
  'SVP':'svp', 'MEP':'mep', 'SWSHP':'swshp', 'XYP':'xyp',
  'BWP':'bwp', 'POP':'pop', 'HGSS':'hgss', 'DPP':'dp',
};

const detectarTipoBusca = (q) => {
  const qu = q.trim().toUpperCase();
  const matchPromoTotal = qu.match(/^([A-Z]{2,5})\s+(\d{1,4})\s*\/\s*[A-Z]*\s*(\d{1,4})$/);
  if (matchPromoTotal) { const setId = PROMO_SETS[matchPromoTotal[1]]; if (setId) return { tipo: 'id', valor: setId + '-' + matchPromoTotal[2].padStart(3,'0') }; }
  const matchPromo = qu.match(/^([A-Z]{2,5})\s+(\d{1,4})$/);
  if (matchPromo) { const setId = PROMO_SETS[matchPromo[1]]; if (setId) return { tipo: 'id', valor: setId + '-' + matchPromo[2].padStart(3,'0') }; }
  const matchAlfa = q.match(/^([A-Za-z]{1,4}\d{1,4})\s*\/\s*([A-Za-z]{1,4}\d{1,4})$/i);
  if (matchAlfa) return { tipo: 'alfatotal', numero: matchAlfa[1].toUpperCase(), total: matchAlfa[2].toUpperCase() };
  const matchNumTotal = q.match(/^(\d+)\s*\/\s*(\d+)$/);
  if (matchNumTotal) return { tipo: 'numtotal', numero: matchNumTotal[1], total: parseInt(matchNumTotal[2], 10) };
  if (/^[a-z0-9.]+-[a-zA-Z0-9]+$/.test(q)) return { tipo: 'id', valor: q };
  if (/^[A-Za-z]{1,4}\d{1,4}$/.test(q)) return { tipo: 'alfanumero', valor: q.toUpperCase() };
  if (/^\d{1,4}$/.test(q)) return { tipo: 'numero', valor: q };
  return { tipo: 'nome', valor: q };
};

const fetchDetalhes = async (id) => {
  try {
    const res = await fetch(TCGDEX_API + '/' + encodeURIComponent(id));
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
};

// Busca nome PT-BR para um conjunto de cartas EN (por id)
const buscarNomesPt = async (cartas) => {
  // Mapeia id → nome PT-BR
  const mapaIds = {};
  // Busca os IDs únicos em pt-br (até 20 cartas em paralelo)
  await Promise.all(cartas.slice(0, 20).map(async (c) => {
    try {
      const res = await fetch(TCGDEX_API_PT + '/' + encodeURIComponent(c.id));
      if (res.ok) {
        const d = await res.json();
        if (d && d.name) mapaIds[c.id] = d.name;
      }
    } catch { /* silencioso */ }
  }));
  return mapaIds;
};

// ── Busca no banco local (cards_db) ─────────────────────────────────
const buscarNoBanco = async (q) => {
  const busca = detectarTipoBusca(q);
  let rows = [];

  // Determinar idiomas a buscar
  // langFiltro: 'pt', 'en', 'ja-jp', ou null (busca PT+EN por padrão)
  const langs = ['pt', 'en'];

  const deduplicar = (lista) => {
    const mapa = {};
    lista.forEach(r => { if (!mapa[r.card_id] || r.lang === 'pt') mapa[r.card_id] = r; });
    return Object.values(mapa);
  };

  if (busca.tipo === 'nome') {
    const { data } = await window.supabase
      .from('cards_db')
      .select('card_id,name,number,set_id,set_name,img_url,img_small,rarity,lang')
      .ilike('name', '%' + busca.valor + '%')
      .in('lang', langs)
      .order('lang', { ascending: true })
      .limit(80);
    rows = deduplicar(data || []);

  } else if (busca.tipo === 'id') {
    const { data } = await window.supabase
      .from('cards_db')
      .select('card_id,name,number,set_id,set_name,img_url,img_small,rarity,lang')
      .eq('card_id', busca.valor)
      .in('lang', langs)
      .limit(5);
    rows = data || [];

  } else if (busca.tipo === 'numero' || busca.tipo === 'alfanumero') {
    const { data } = await window.supabase
      .from('cards_db')
      .select('card_id,name,number,set_id,set_name,img_url,img_small,rarity,lang')
      .ilike('number', busca.valor)
      .in('lang', langs)
      .limit(60);
    rows = deduplicar(data || []);

  } else if (busca.tipo === 'numtotal' || busca.tipo === 'alfatotal') {
    const numBusca   = String(parseInt(busca.numero, 10));
    const numPadded  = busca.numero.padStart(3, '0');
    const totalBusca = typeof busca.total === 'number'
      ? busca.total
      : parseInt((busca.total || '0').replace(/[^0-9]/g, ''), 10);

    console.log('🔍 numtotal busca:', { numBusca, numPadded, totalBusca, langs });

    // Tenta número sem zeros E com zeros, numa query só com OR
    const { data, error } = await window.supabase
      .from('cards_db')
      .select('card_id,name,number,set_id,set_name,img_url,img_small,rarity,lang,set_total')
      .or(`number.eq.${numBusca},number.eq.${numPadded}`)
      .eq('set_total', totalBusca)
      .in('lang', langs)
      .limit(20);

    console.log('🔍 resultado:', data, 'erro:', error);
    rows = data || [];

    // Deduplicar preferindo PT
    const mapa = {};
    rows.forEach(r => { if (!mapa[r.card_id] || r.lang === 'pt') mapa[r.card_id] = r; });
    rows = Object.values(mapa);
  }

  // Normalizar para o formato que o app espera
  return rows.slice(0, 40).map(r => ({
    id:     r.card_id,
    name:   r.name,
    nameEn: r.name,
    namePt: r.lang === 'pt' ? r.name : null,
    number: r.number || '',
    rarity: r.rarity || '',
    set:    { name: r.set_name || r.set_id || '' },
    images: {
      small: r.img_small || r.img_url || '',
      large: r.img_url   || r.img_small || '',
    },
  }));
};

// Executa a busca — banco local primeiro, API externa como fallback
const tcgdexBuscar = async (q) => {
  // Banco local primeiro
  try {
    const resultados = await buscarNoBanco(q, null);
    if (resultados.length > 0) return resultados;
  } catch(e) {
    console.warn('Banco local falhou, usando API:', e.message);
  }

  // 2. Fallback: API TCGDex original
  const busca = detectarTipoBusca(q);

  if (busca.tipo === 'nome') {
    const [resEn, resPt] = await Promise.allSettled([
      fetch(TCGDEX_API    + '?name=' + encodeURIComponent(busca.valor)),
      fetch(TCGDEX_API_PT + '?name=' + encodeURIComponent(busca.valor)),
    ]);
    const cartasEn = resEn.status === 'fulfilled' && resEn.value.ok ? (await resEn.value.json()).filter(c => c.image && c.id) : [];
    const cartasPt = resPt.status === 'fulfilled' && resPt.value.ok ? (await resPt.value.json()).filter(c => c.image && c.id) : [];
    const mapaId2pt = {};
    cartasPt.forEach(c => { mapaId2pt[c.id] = c.name; });
    const idsEn = new Set(cartasEn.map(c => c.id));
    const soPt  = cartasPt.filter(c => !idsEn.has(c.id));
    return [...cartasEn.map(c => normalizeTcgdex(c, mapaId2pt[c.id] || null)), ...soPt.map(c => normalizeTcgdex(c, c.name))].slice(0, 40);
  }

  if (busca.tipo === 'id') {
    const [resEn, resPt] = await Promise.allSettled([
      fetch(TCGDEX_API    + '/' + encodeURIComponent(busca.valor)),
      fetch(TCGDEX_API_PT + '/' + encodeURIComponent(busca.valor)),
    ]);
    if (resEn.status !== 'fulfilled' || !resEn.value.ok) return [];
    const data   = await resEn.value.json();
    const namePt = resPt.status === 'fulfilled' && resPt.value.ok ? (await resPt.value.json()).name : null;
    return data && data.id ? [normalizeTcgdex(data, namePt)] : [];
  }

  let cartasEn = [];
  if (busca.tipo === 'numtotal') {
    const numSemZero = String(parseInt(busca.numero, 10));
    const res = await fetch(TCGDEX_API + '?localId=' + encodeURIComponent(numSemZero));
    if (!res.ok) return [];
    const lista = await res.json();
    if (!Array.isArray(lista) || lista.length === 0) return [];
    const candidatas = lista.filter(c => c.image && c.id);
    const detalhes = await Promise.all(candidatas.map(c => fetchDetalhes(c.id)));
    cartasEn = detalhes.filter(d => d && d.set?.cardCount?.official === busca.total && parseInt(d.localId, 10) === parseInt(busca.numero, 10));
  } else if (busca.tipo === 'alfatotal') {
    const res = await fetch(TCGDEX_API + '?localId=' + encodeURIComponent(busca.numero));
    if (!res.ok) return [];
    const lista = await res.json();
    if (!Array.isArray(lista) || lista.length === 0) return [];
    const candidatas = lista.filter(c => c.image && c.id);
    const detalhes = await Promise.all(candidatas.map(c => fetchDetalhes(c.id)));
    const totalNum = parseInt(busca.total.replace(/^[A-Za-z]+/, ''), 10);
    cartasEn = detalhes.filter(d => d && (d.localId||'').toUpperCase() === busca.numero && d.set?.cardCount?.official === totalNum);
  } else if (busca.tipo === 'alfanumero') {
    const res = await fetch(TCGDEX_API + '?localId=' + encodeURIComponent(busca.valor));
    if (!res.ok) return [];
    const data = await res.json();
    cartasEn = Array.isArray(data) ? data.filter(c => c.image && c.id) : [];
  } else if (busca.tipo === 'numero') {
    const numSemZero = String(parseInt(busca.valor, 10));
    const res = await fetch(TCGDEX_API + '?localId=' + encodeURIComponent(numSemZero));
    if (!res.ok) return [];
    const data = await res.json();
    cartasEn = Array.isArray(data) ? data.filter(c => c.image && c.id) : [];
  }
  if (cartasEn.length === 0) return [];
  const mapaId2pt = await buscarNomesPt(cartasEn);
  return cartasEn.map(c => normalizeTcgdex(c, mapaId2pt[c.id] || null));
};

/* ─── buscarCartaIdioma — Busca inteligente para import Excel ─────────────── */
const buscarCartaIdioma = async (numero, nome, idioma = 'EN', setIdOverride = '') => {
  const JP_ONLY = idioma === 'JP';
  const baseUrl = JP_ONLY ? 'https://api.tcgdex.net/v2/ja/cards' : TCGDEX_API;
  
  // Normalizar número
  let searchNum = String(numero).trim().toUpperCase();
  
  // Detectar tipo de carta
  const isPromo = /^[A-Z]+-?\d+$/.test(searchNum); // SVP-001, XY84
  const isSubset = /^[A-Z]{2}\d+\/[A-Z]{2}\d+$/.test(searchNum); // TG30/TG30
  const isNormal = /^\d+\/\d+$/.test(searchNum); // 006/165
  
  let searchId = null;
  
  if (setIdOverride) {
    // Se tem Set definido, usar ele
    const num = searchNum.replace(/[^0-9]/g, '');
    searchId = `${setIdOverride}-${num}`;
  } else if (isPromo) {
    // Promos: SVP-001 → svp-001 (lowercase)
    searchId = searchNum.toLowerCase().replace('-', '-');
    // Exceção: XY promos precisam de "xyp-" prefix
    if (/^XY\d+$/.test(searchNum)) {
      searchId = `xyp-${searchNum.toLowerCase()}`;
    }
  } else if (isSubset) {
    // Subsets: TG30/TG30 → buscar pelo total
    const match = searchNum.match(/^([A-Z]{2})(\d+)\/[A-Z]{2}(\d+)$/);
    if (match) {
      const prefix = match[1].toLowerCase();
      const num = parseInt(match[2], 10);
      const total = parseInt(match[3], 10);
      
      try {
        const res = await fetch(`${baseUrl}?localId=${num}`);
        if (res.ok) {
          const cards = await res.json();
          const found = cards.find(c => 
            c.set?.cardCount?.official === total &&
            c.localId?.toLowerCase() === searchNum.toLowerCase()
          );
          if (found) return found;
        }
      } catch (e) {}
    }
  } else if (isNormal) {
    // Normal: 006/165 → buscar pelo total
    const [num, total] = searchNum.split('/').map(n => parseInt(n, 10));
    
    try {
      const res = await fetch(`${baseUrl}?localId=${num}`);
      if (res.ok) {
        const cards = await res.json();
        const found = cards.find(c => c.set?.cardCount?.official === total);
        if (found) return found;
      }
    } catch (e) {}
  }
  
  // Se não achou, tentar buscar por ID direto
  if (searchId) {
    try {
      const res = await fetch(`${baseUrl}/${searchId}`);
      if (res.ok) return await res.json();
    } catch (e) {}
  }
  
  // Fallback: buscar por nome
  if (nome) {
    try {
      const res = await fetch(`${baseUrl}?name=${encodeURIComponent(nome)}`);
      if (res.ok) {
        const cards = await res.json();
        return cards[0];
      }
    } catch (e) {}
  }
  
  return null;
};

/* ─── BlocoCarrossel — componente reutilizável para fotos dos blocos ─── */
const BlocoCarrossel = ({ fotos, dark = true }) => {
  const [ativo,  setAtivo]  = React.useState(0);
  const [zoom,   setZoom]   = React.useState(false);
  const [scale,  setScale]  = React.useState(1);
  const [offset, setOffset] = React.useState({x:0, y:0});

  const touchStart  = React.useRef(null);
  const lastDist    = React.useRef(null);
  const dragStart   = React.useRef(null);
  const isDragging  = React.useRef(false);

  const clamp = (v,mn,mx) => Math.min(mx, Math.max(mn, v));
  const resetZoom = () => { setScale(1); setOffset({x:0,y:0}); };

  // Swipe para trocar foto (quando zoom=1)
  const onTouchStart = e => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd   = e => {
    if (touchStart.current === null) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0) setAtivo(a => Math.min(fotos.length - 1, a + 1));
      else          setAtivo(a => Math.max(0, a - 1));
    }
    touchStart.current = null;
  };

  // Scroll do mouse para zoom
  const onWheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    setScale(s => { const ns = clamp(s + delta, 1, 5); if (ns <= 1) setOffset({x:0,y:0}); return ns; });
  };

  // Touch: pinch para zoom, drag para mover
  const onTouchStartLB = e => {
    if (e.touches.length === 2) {
      lastDist.current = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    } else if (e.touches.length === 1 && scale > 1) {
      dragStart.current = { x: e.touches[0].clientX - offset.x, y: e.touches[0].clientY - offset.y };
      isDragging.current = true;
    } else {
      onTouchStart(e);
    }
  };

  const onTouchMoveLB = e => {
    if (e.touches.length === 2 && lastDist.current) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const ratio = dist / lastDist.current;
      setScale(s => clamp(s * ratio, 1, 5));
      lastDist.current = dist;
    } else if (e.touches.length === 1 && isDragging.current && scale > 1) {
      e.preventDefault();
      setOffset({ x: e.touches[0].clientX - dragStart.current.x, y: e.touches[0].clientY - dragStart.current.y });
    }
  };

  const onTouchEndLB = e => {
    lastDist.current = null;
    isDragging.current = false;
    if (scale <= 1) { onTouchEnd(e); setOffset({x:0,y:0}); }
  };

  if (!fotos || fotos.length === 0) return null;

  return (
    <>
      {/* ── Lightbox zoom ── */}
      {zoom && (
        <div className="fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center"
          onClick={() => { if(scale <= 1) { setZoom(false); } else { resetZoom(); } }}>

          {fotos.length > 1 && scale <= 1 && (
            <>
              <button onClick={e=>{e.stopPropagation();setAtivo(a=>Math.max(0,a-1));resetZoom();}} disabled={ativo===0}
                className="absolute left-3 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 text-white w-10 h-10 rounded-full flex items-center justify-center text-3xl disabled:opacity-20 z-10">‹</button>
              <button onClick={e=>{e.stopPropagation();setAtivo(a=>Math.min(fotos.length-1,a+1));resetZoom();}} disabled={ativo===fotos.length-1}
                className="absolute right-3 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 text-white w-10 h-10 rounded-full flex items-center justify-center text-3xl disabled:opacity-20 z-10">›</button>
            </>
          )}

          <div style={{width:'100vw',height:'85vh',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}
            onWheel={onWheel}
            onTouchStart={onTouchStartLB}
            onTouchMove={onTouchMoveLB}
            onTouchEnd={onTouchEndLB}>
            <img src={fotos[ativo]} alt={`Bloco ${ativo+1}`}
              onClick={e=>e.stopPropagation()}
              style={{
                transform: `scale(${scale}) translate(${offset.x/scale}px, ${offset.y/scale}px)`,
                transition: isDragging.current ? 'none' : 'transform 0.15s ease',
                maxWidth:'100%', maxHeight:'85vh', objectFit:'contain',
                cursor: scale > 1 ? 'grab' : 'zoom-in',
                userSelect:'none', touchAction:'none'
              }}
              draggable={false}
            />
          </div>

          <div className="flex items-center gap-3 mt-2">
            {scale > 1 && (
              <button onClick={e=>{e.stopPropagation();resetZoom();}}
                className="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1.5 rounded-full">
                🔎 {Math.round(scale*100)}% — Resetar
              </button>
            )}
            <span className="text-white/60 text-xs">{ativo+1} / {fotos.length}</span>
            <button onClick={()=>{setZoom(false);resetZoom();}}
              className="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-4 py-1.5 rounded-full">
              ✕ Fechar
            </button>
          </div>

          <p className="text-white/40 text-[10px] mt-1">
            {scale <= 1 ? 'Scroll ou pinch para zoom · Toque para fechar' : 'Arraste para mover · Toque para resetar'}
          </p>

          {fotos.length > 1 && scale <= 1 && (
            <div className="flex gap-2 mt-2 px-4 overflow-x-auto">
              {fotos.map((url,i) => (
                <button key={i} onClick={e=>{e.stopPropagation();setAtivo(i);resetZoom();}}
                  className={`flex-shrink-0 w-14 h-14 rounded-lg overflow-hidden border-2 transition-all ${ativo===i?'border-yellow-400 opacity-100':'border-white/20 opacity-50 hover:opacity-80'}`}>
                  <img src={url} className="w-full h-full object-cover" />
                </button>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── Carrossel normal ── */}
      <div className={`rounded-2xl overflow-hidden border-2 border-yellow-300 shadow-xl ${dark ? 'bg-gray-900' : 'bg-gray-100'}`}>
        <div className={`flex items-center justify-between px-3 py-1.5 ${dark ? 'bg-gray-800' : 'bg-gray-200'}`}>
          <span className="text-yellow-400 text-[11px] font-black tracking-wide">📦 BLOCOS DO LEILÃO</span>
          <div className="flex items-center gap-2">
            <span className={`text-[10px] ${dark ? 'text-gray-400' : 'text-gray-500'}`}>{ativo + 1} / {fotos.length}</span>
            <button onClick={()=>setZoom(true)}
              className="bg-yellow-400/20 hover:bg-yellow-400/40 text-yellow-300 text-[10px] font-bold px-2 py-0.5 rounded-full transition-all">
              🔍 Zoom
            </button>
          </div>
        </div>
        <div className="relative" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
          <img src={fotos[ativo]} alt={`Bloco ${ativo + 1}`}
            onClick={()=>setZoom(true)}
            className={`w-full object-contain max-h-72 cursor-zoom-in ${dark ? 'bg-gray-900' : 'bg-white'}`}
            onError={e => { e.target.parentElement.style.display = 'none'; }} />
          {/* Hint de zoom na primeira vez */}
          <div className="absolute bottom-2 left-2 bg-black/70 text-white text-[10px] font-bold px-2 py-0.5 rounded-full pointer-events-none">
            Toque para ampliar 🔍
          </div>
          {fotos.length > 1 && (
            <>
              <button onClick={() => setAtivo(a => Math.max(0, a - 1))} disabled={ativo === 0}
                className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center text-4xl disabled:opacity-20 hover:bg-black/80">‹</button>
              <button onClick={() => setAtivo(a => Math.min(fotos.length - 1, a + 1))} disabled={ativo === fotos.length - 1}
                className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center text-4xl disabled:opacity-20 hover:bg-black/80">›</button>
            </>
          )}
        </div>
        {fotos.length > 1 && (
          <div className={`flex gap-1.5 p-2 overflow-x-auto ${dark ? 'bg-gray-800' : 'bg-gray-200'}`}>
            {fotos.map((url, i) => (
              <button key={i} onClick={() => setAtivo(i)}
                className={`flex-shrink-0 w-12 h-12 rounded-lg overflow-hidden border-2 transition-all ${ativo === i ? 'border-yellow-400' : 'border-gray-600 opacity-50 hover:opacity-90'}`}>
                <img src={url} className="w-full h-full object-cover" alt={`Bloco ${i+1}`} />
              </button>
            ))}
          </div>
        )}
      </div>
    </>
  );
};

/* ─── Filtro de raridade comum ─────────────────────────────────
   Raridades "não raras" no TCGdex: Common, Uncommon, None, vazia.

    </div>
  );

  const urlBase64ToUint8Array = (base64String) => {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);

      const existing = prev.find(x=>x.query.toLowerCase()===query.toLowerCase());
      const updated  = existing
        ? prev.map(x=>x.query.toLowerCase()===query.toLowerCase()?{...x,count:x.count+1,last:new Date()}:x)
        : [...prev,{query:query.trim(),count:1,last:new Date()}];
      const sorted = [...updated].sort((a,b)=>b.count-a.count);
      console.group('%c📊 Agenda Pokémon — Backlog de Buscas','color:#8B5CF6;font-weight:bold;font-size:14px');
      console.table(sorted.map((s,i)=>({'#':i+1,'Carta':s.query,'Buscas':s.count,'Última':new Date(s.last).toLocaleString('pt-BR')})));
      console.groupEnd();
      return updated;
    });

  const RegisterScreen = () => {
    const [accountType, setAccountType] = React.useState('collector');
    const [formData, setFormData] = React.useState({
      displayName: '',
      apelido: '',
      email: '',
      whatsapp: '',
      password: '',
      confirmPassword: ''
    });
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState('');
    const [termsAccepted, setTermsAccepted] = React.useState(false);
    
    const isAuc = accountType === 'auctioneer';

    const handleRegister = async () => {
      setError('');
      
      // Validações
      if (!formData.displayName || !formData.apelido || !formData.email || !formData.password) {
        setError('Preencha todos os campos obrigatórios');
        return;
      }
      
      if (!formData.whatsapp || formData.whatsapp.replace(/[^0-9]/g, '').length < 12) {
        setError('WhatsApp obrigatório — formato: 55 (DD) 9XXXX-XXXX');
        return;
      }
      
      if (formData.password !== formData.confirmPassword) {
        setError('As senhas não coincidem');
        return;
      }
      
      if (formData.password.length < 6) {
        setError('A senha deve ter pelo menos 6 caracteres');
        return;
      }
      
      if (!termsAccepted) {
        setError('Aceite os termos para continuar');
        return;
      }
      
      setLoading(true);

      // 0. Verificar se e-mail já existe (tenta login silencioso para checar)
      const { data: existCheck } = await supabase
        .from('profiles')
        .select('id, email')
        .eq('email', formData.email.trim().toLowerCase())
        .limit(1);

      if (existCheck && existCheck.length > 0) {
        setError('Este e-mail já está cadastrado. Faça login ou use outro e-mail.');
        setLoading(false);
        return;
      }
      
      // 1. Criar usuário no Supabase Auth
      const { data, error: signUpError } = await sbAuth.signUp(
        formData.email, 
        formData.password, 
        formData.displayName
      );
      
      if (signUpError) {
        const msg = signUpError.message || '';
        if (msg.includes('already registered') || msg.includes('already exists') || msg.includes('email') ) {
          setError('Este e-mail já está cadastrado. Faça login ou use outro e-mail.');
        } else {
          setError(msg || 'Erro ao criar conta. Tente novamente.');
        }
        setLoading(false);
        return;
      }
      
      if (data?.user) {
        console.log('✅ Usuário criado no Auth!', data.user);
        
        // Aguardar um momento para garantir que auth.users foi populado
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // 2. Criar perfil usando função SQL (SECURITY DEFINER)
        try {
          const { data: result, error: rpcError } = await supabase.rpc('create_user_profile', {
            user_id: data.user.id,
            user_email: formData.email,
            user_name: formData.apelido,
            user_tipo: isAuc ? 'leiloeiro' : 'participante',
            user_whatsapp: formData.whatsapp || null
          });
          
          if (rpcError) {
            console.error('❌ Erro ao criar perfil:', rpcError);
            if (rpcError.message?.includes('duplicate') || rpcError.message?.includes('unique') || rpcError.code === '23505') {
              setError('Este e-mail já está cadastrado. Faça login ou use outro e-mail.');
            } else {
              setError('Conta criada, mas erro ao salvar perfil. Entre em contato com suporte.');
            }
            setLoading(false);
            return;
          }
          
          console.log('✅ Perfil criado!', result);
          
          if (isAuc) {
            alert('✅ Conta de leiloeiro criada! Aguarde aprovação da equipe Agenda Pokémon.');
          }
          
          setUser(data.user);
          const savedScreen = localStorage.getItem('agenda-pokemon-screen');
          // Deep link: ?leilao=ID
          const urlParams = new URLSearchParams(window.location.search);
          const leilaoId = urlParams.get('leilao');
          if (leilaoId) {
            localStorage.setItem('agenda-pokemon-deep-link', leilaoId);
          }
          // Deep link: ?vitrine=USER_ID
          const vitrineId = urlParams.get('vitrine');
          if (vitrineId) {
            localStorage.setItem('agenda-pokemon-deep-vitrine', vitrineId);
          }
          // Detectar retorno do link de reset de senha (hash #access_token + type=recovery)
          const hashParams = new URLSearchParams(window.location.hash.replace('#',''));
          if (hashParams.get('type') === 'recovery') {
            setScreen('redefinirSenha');
            return;
          }
          const validScreens = ['home', 'calendar', 'search', 'vitrine', 'profile', 'minhaVitrine', 'publicProfile', 'avaliacoes', 'wishlist'];
          if (savedScreen === 'publicProfile') {
            const savedProfile = localStorage.getItem('agenda-pokemon-viewing-profile');
            if (savedProfile) setViewingProfile(JSON.parse(savedProfile));
          }
          setScreen(validScreens.includes(savedScreen) ? savedScreen : 'calendar');
        } catch (err) {
          console.error('❌ Exception ao criar perfil:', err);
          setError('Erro inesperado ao criar perfil. Tente novamente.');

        }

  const CalendarScreen = () => {

    const [selectedDate, setSelectedDate] = useState(null);
    const [showDayModal, setShowDayModal] = useState(false);
    const getDays = (month) => {
      const first = new Date(month.getFullYear(), month.getMonth(), 1);
      const last  = new Date(month.getFullYear(), month.getMonth() + 1, 0);
      const days  = [];
      for (let i = 0; i < first.getDay(); i++) days.push(null);
      for (let d = 1; d <= last.getDate(); d++) days.push(new Date(month.getFullYear(), month.getMonth(), d));
      return days;
    };

      if (!date) return [];
      return EVENTS.filter(e => e.date === date.toISOString().split('T')[0]);

      .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

  const SearchWantedScreen = () => {

    const doSearch = async (override) => {
      const q = (override !== undefined ? override : query).trim();
      if (!q) return;
      setLoading(true);
      setApiError('');
      setResults([]);
      setSearched(q);
      try {
        let found = [];
        try { found = await buscarNoBanco(q); } catch(e) {}
        if (found.length === 0) found = await tcgdexBuscar(q);
        setResults(found);
        if (found.length === 0) setApiError('Nenhuma carta encontrada para "' + q + '"');
      } catch (e) {
        setApiError('Erro na busca. Verifique sua conexão.');
      }
      setLoading(false);
    };

    // Debounce para busca em tempo real (600ms após parar de digitar)
    const debounceRef = React.useRef(null);
    const handleChange = (val) => {
      setQuery(val);
      if (!val.trim()) {
        setResults([]); setSearched(''); setApiError('');
        if (debounceRef.current) clearTimeout(debounceRef.current);
        return;

      if (debounceRef.current) clearTimeout(debounceRef.current);
      debounceRef.current = setTimeout(() => { doSearch(val); }, 600);

          set: vc.set_name || '',
          setId: vc.card_id || '',

                  const auctions = EVENTS.filter(ev =>

                  );
                  const rarityColor = rarity.toLowerCase().includes('secret') || rarity.toLowerCase().includes('rainbow') || rarity.toLowerCase().includes('illustration')
                    ? 'bg-purple-100 text-purple-700'

                <img src={POKE.eevee} className="w-20 mx-auto mb-3 opacity-50" />

  const WishlistScreen = () => {
    const [wantedModal, setWantedModal] = React.useState(null);
    const [filter, setFilter] = React.useState('all'); // 'all' | 'found' | 'missing'

    const wantedWithMatches = wantedList.map(wc => {
      const todayStr = new Date().toISOString().split('T')[0];
      const matches = EVENTS.filter(ev =>
        ev.date >= todayStr &&
        (ev.cards || []).some(ec => matchWanted(wc, ec)));
      const vitrineMatches = vitrineAll.filter(vc => {
        const vcAdapted = { id: vc.card_id || vc.id, name: vc.name, number: vc.number, set: { name: vc.set_name }, setId: vc.set_id };
        return matchWanted(wc, vcAdapted);
      });
      return { ...wc, matches, vitrineMatches };
    });

    const filtered = wantedWithMatches.filter(wc => {
      if (filter === 'found')   return wc.matches.length > 0 || wc.vitrineMatches.length > 0;
      if (filter === 'missing') return wc.matches.length === 0 && wc.vitrineMatches.length === 0;
      return true;
    });

    const countFound   = wantedWithMatches.filter(w => w.matches.length > 0 || w.vitrineMatches.length > 0).length;
    const countMissing = wantedWithMatches.filter(w => w.matches.length === 0 && w.vitrineMatches.length === 0).length;

    return (
      <div className="min-h-screen bg-gray-50 pb-24">

        {/* Header */}
        <div className="sticky top-0 z-20 bg-gradient-to-r from-yellow-400 to-amber-500 text-gray-900 p-5 pb-6 relative overflow-hidden">

            </div>
            <ProfileBtn />
          </div>
        </div>

        <div className="px-4 pt-4 space-y-3">

            </div>
            <div className="bg-white rounded-2xl p-3 text-center shadow-sm border border-green-100">
              <p className="text-xl font-black text-green-600">{countFound}</p>
              <p className="text-[10px] text-gray-500 font-semibold">Encontradas</p>
            </div>
            <div className="bg-white rounded-2xl p-3 text-center shadow-sm border border-gray-100">
              <p className="text-xl font-black text-gray-400">{countMissing}</p>

  const AuctioneerScreen = ({ editingAuction = null }) => {

      try {

          .from('grupos')
          .select('*')
          .order('created_at', { ascending: false });

      try {
        const ext = file.name.split('.').pop();
        const fileName = `leilao-foto-${user.id}-${Date.now()}.${ext}`;
        const { error: upErr } = await supabase.storage.from('Avatars').upload(fileName, file, { upsert: true });
        if (upErr) { console.error('Upload error:', upErr); return null; }
        const { data: urlData } = supabase.storage.from('Avatars').getPublicUrl(fileName);
        return urlData.publicUrl;
      } catch(e) { return null; }
    };

    const uploadAndSaveAvatar = async (file, groupId) => {

        // Nome único para o arquivo

        // Upload para o bucket avatars
        const { error: uploadError } = await supabase.storage
          .from('Avatars')
          .upload(fileName, file, { upsert: true });
        
        if (uploadError) {
          console.error('❌ Erro no upload:', uploadError);
          return null;
        }
        
        // Pegar URL pública

        // Salvar URL na tabela grupos se tiver groupId
        if (groupId) {
          await supabase.from('grupos').update({ avatar_url: publicUrl }).eq('id', groupId);

          {/* ── STEPS ── */}

                    <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full text-[10px] font-black mr-1 ${step===s.n?'bg-white text-gray-800':step>s.n?'bg-green-500 text-white':'bg-gray-200 text-gray-500'}`}>
                      {step>s.n?'✓':s.n}
                    </span>
                    {s.label}
                  </button>
                ))}
              </div>
            )}

            {/* ══ STEP 1: INFORMAÇÕES + AVATAR + BLOCOS ══ */}
            {step===1 && (() => {
              // Grupos filtrados pela busca
              const allGroups = [
                ...savedGroups,
                ...AUCTION_GROUPS.filter(g => !savedGroups.find(s => s.id === g.id))
              ];
              const filteredGroups = groupSearch.trim()
                ? allGroups.filter(g =>
                    g.short.toLowerCase().includes(groupSearch.toLowerCase()) ||
                    g.name.toLowerCase().includes(groupSearch.toLowerCase())
                  )
                : allGroups;

              const selectedGroup = allGroups.find(g => g.id === form.groupId);

              return (
              <div className="p-4 space-y-5">

                {/* ── Nome / Grupo do leilão ── */}
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-2">🏷️ Nome do Leilão</label>

                  {/* Grupo selecionado — mostra pill e permite trocar */}
                  {selectedGroup ? (
                    <div className="flex items-center gap-3 p-3 rounded-2xl bg-green-50 border-2 border-green-400 mb-2">
                      <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${selectedGroup.color} flex items-center justify-center text-xl flex-shrink-0 shadow`}>
                        {selectedGroup.avatarUrl
                          ? <img src={selectedGroup.avatarUrl} className="w-10 h-10 rounded-full object-cover" />
                          : selectedGroup.emoji}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="font-bold text-sm text-gray-800 truncate">{selectedGroup.short}</p>
                        <p className="text-[10px] text-green-600 font-semibold">✓ Grupo selecionado</p>
                      </div>
                      <button onClick={()=>{ setForm(p=>({...p,groupId:'',name:''})); setGroupSearch(''); }}
                        className="text-gray-400 hover:text-red-500 text-lg px-1">✕</button>
                    </div>
                  ) : (
                    <>
                      {/* Campo de busca de grupo */}
                      <div className="relative mb-2">
                        <input
                          value={groupSearch}
                          onChange={e => {
                            setGroupSearch(e.target.value);
                            setForm(p => ({...p, name: e.target.value}));
                          }}
                          placeholder="Buscar ou digitar nome do leilão…"
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-yellow-400 outline-none pr-10"
                        />
                        <span className="absolute right-3 top-3 text-gray-400">🔍</span>
                      </div>

                      {/* Lista de grupos filtrada */}
                      {groupSearch.trim() && (
                        <div className="border-2 border-gray-200 rounded-xl overflow-hidden max-h-48 overflow-y-auto shadow-lg mb-2">
                          {filteredGroups.length > 0 ? filteredGroups.map(g => (
                            <button key={g.id}
                              onClick={() => {
                                setForm(p => ({...p, groupId: g.id, name: g.short, announcementPhoto: g.avatarUrl || p.announcementPhoto, whatsappLink: g.whatsappLink || p.whatsappLink}));
                                if (g.avatarUrl) setPhotoPreviewUrls(p => ({...p, announcement: g.avatarUrl}));
                                setGroupSearch('');
                                // Salva grupo para uso futuro se ainda não estiver salvo
                                if (!savedGroups.find(s => s.id === g.id)) {
                                  const updated = [g, ...savedGroups.filter(s => s.id !== g.id)];
                                setSavedGroups(updated);
                                persistGroups(updated);
                                }
                              }}
                              className="w-full flex items-center gap-3 p-2.5 hover:bg-yellow-50 border-b last:border-0 text-left transition-all">
                              <div className={`w-9 h-9 rounded-full bg-gradient-to-br ${g.color} flex items-center justify-center text-lg flex-shrink-0 shadow-sm flex-shrink-0`}>
                                {g.avatarUrl
                                  ? <img src={g.avatarUrl} className="w-9 h-9 rounded-full object-cover" />
                                  : g.emoji}
                              </div>
                              <span className="text-sm font-semibold text-gray-700">{g.short}</span>
                              {savedGroups.find(s=>s.id===g.id) && (
                                <span className="ml-auto text-[10px] text-yellow-600 font-bold">⭐ Salvo</span>
                              )}
                            </button>
                          )) : (
                            <button
                              onClick={() => {
                                const newGroup = {
                                  id: 'custom-' + Date.now(),
                                  name: groupSearch, short: groupSearch,
                                  emoji: '🎴', color: 'from-gray-600 to-gray-800',
                                  avatarUrl: null,
                                  whatsappLink: form.whatsappLink || null,
                                };
                                const updatedGroups = [newGroup, ...savedGroups];
                                setSavedGroups(updatedGroups);
                                persistGroups(updatedGroups);
                                setForm(p => ({...p, groupId: newGroup.id, name: groupSearch}));
                                setGroupSearch('');
                              }}
                              className="w-full flex items-center gap-3 p-3 hover:bg-blue-50 text-left">
                              <div className="w-9 h-9 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-lg flex-shrink-0">+</div>
                              <div>
                                <p className="text-sm font-bold text-blue-600">Cadastrar "{groupSearch}"</p>
                                <p className="text-[10px] text-gray-400">Salvar como novo grupo</p>
                              </div>
                            </button>
                          )}
                        </div>
                      )}
                    </>
                  )}
                </div>

                {/* ── Avatar do Leiloeiro ── */}
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-2">🖼️ Avatar do Leiloeiro</label>
                  {photoPreviewUrls.announcement ? (
                    <div className="flex items-center gap-4 p-3 bg-green-50 border-2 border-green-300 rounded-2xl">
                      <img src={photoPreviewUrls.announcement} alt="Avatar"
                        className="w-16 h-16 rounded-full object-cover border-4 border-white shadow-lg flex-shrink-0" />
                      <div className="flex-1">
                        <p className="font-bold text-sm text-gray-800">Avatar definido ✓</p>
                        <p className="text-[10px] text-gray-500 mt-0.5">Vinculado ao grupo</p>
                      </div>
                      <button
                        onClick={e=>{e.preventDefault();setPhotoPreviewUrls(p=>({...p,announcement:null}));setForm(p=>({...p,announcementPhoto:null}));}}
                        className="w-7 h-7 bg-gray-200 hover:bg-red-100 text-gray-500 hover:text-red-500 rounded-full flex items-center justify-center font-bold flex-shrink-0">✕</button>
                    </div>
                  ) : (
                  <label className="block cursor-pointer">
                    <div className="rounded-2xl border-2 border-dashed border-gray-300 hover:border-yellow-400 bg-gray-50 p-5 text-center transition-all">
                      <p className="text-3xl mb-1">👤</p>
                      <p className="text-sm font-semibold text-gray-500">Adicionar avatar do grupo</p>
                      <p className="text-[10px] text-gray-400 mt-0.5">Foto de perfil do WhatsApp</p>
                    </div>
                    <input type="file" accept="image/*" className="hidden"
                      onChange={async e=>{
                        const f = e.target.files?.[0]; if (!f) return;
                        // Preview imediato com blob URL
                        const previewUrl = URL.createObjectURL(f);
                        setPhotoPreviewUrls(p=>({...p,announcement:previewUrl}));
                        setForm(p=>({...p,announcementPhoto:previewUrl}));
                        // Upload para Supabase Storage
                        const publicUrl = await uploadAndSaveAvatar(f, form.groupId);
                        if (publicUrl) {
                          // Substitui blob URL pela URL pública permanente
                          setForm(p=>({...p,announcementPhoto:publicUrl}));
                          setPhotoPreviewUrls(p=>({...p,announcement:publicUrl}));
                          if (form.groupId) {
                            setSavedGroups(prev => prev.map(g =>
                              g.id === form.groupId ? {...g, avatarUrl: publicUrl} : g
                            ));
                          }
                        }
                      }} />
                  </label>
                  )}
                </div>

                {/* ── Fotos do Bloco de Cartas ── */}
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-2">📸 Fotos do Bloco de Cartas</label>
                  <div className="space-y-2">
                    {/* Preview das fotos já adicionadas */}
                    {form.eventPhotos && form.eventPhotos.length > 0 && (
                      <div className="flex gap-2 overflow-x-auto pb-1">
                        {form.eventPhotos.map((url, i) => (
                          <div key={i} className="relative flex-shrink-0">
                            <img src={url} className="w-20 h-24 object-cover rounded-xl border-2 border-gray-200 shadow" />
                            <button onClick={()=>setForm(p=>({...p,eventPhotos:p.eventPhotos.filter((_,j)=>j!==i)}))}
                              className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center font-black shadow">✕</button>
                          </div>
                        ))}
                        {/* Botão adicionar mais */}
                        <label className="flex-shrink-0 w-20 h-24 rounded-xl border-2 border-dashed border-gray-300 hover:border-yellow-400 bg-gray-50 flex flex-col items-center justify-center cursor-pointer transition-all">
                          <span className="text-2xl">＋</span>
                          <span className="text-[10px] text-gray-400 mt-0.5">Adicionar</span>
                          <input type="file" accept="image/*" multiple className="hidden"
                            onChange={async e => {
                              const files = Array.from(e.target.files||[]);
                              for (const f of files) {
                                const preview = URL.createObjectURL(f);
                                setForm(p=>({...p, eventPhotos:[...p.eventPhotos, preview]}));
                                const url = await uploadEventPhoto(f);
                                if (url) setForm(p=>({...p, eventPhotos:p.eventPhotos.map(u=>u===preview?url:u)}));
                              }
                              e.target.value='';
                            }} />
                        </label>
                      </div>
                    )}
                    {/* Estado vazio */}
                    {(!form.eventPhotos || form.eventPhotos.length === 0) && (
                      <label className="block cursor-pointer">
                        <div className="rounded-2xl border-2 border-dashed border-gray-300 hover:border-yellow-400 bg-gray-50 p-5 text-center transition-all">
                          <p className="text-3xl mb-1">📸</p>
                          <p className="text-sm font-semibold text-gray-500">Adicionar fotos do bloco</p>
                          <p className="text-[10px] text-gray-400 mt-0.5">Aparece no calendário ao clicar no leilão</p>
                        </div>
                        <input type="file" accept="image/*" multiple className="hidden"
                          onChange={async e => {
                            const files = Array.from(e.target.files||[]);
                            for (const f of files) {
                              const preview = URL.createObjectURL(f);
                              setForm(p=>({...p, eventPhotos:[...(p.eventPhotos||[]), preview]}));
                              const url = await uploadEventPhoto(f);
                              if (url) setForm(p=>({...p, eventPhotos:p.eventPhotos.map(u=>u===preview?url:u)}));
                            }
                            e.target.value='';
                          }} />
                      </label>
                    )}
                  </div>
                </div>

                {/* ── Data e Horário ── */}
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-1">📅 Data *</label>
                    <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}
                      className="w-full px-3 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-gray-800 outline-none" />
                  </div>
                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-1">⏰ Horário *</label>
                    <input type="time" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))}
                      className="w-full px-3 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-gray-800 outline-none" />
                  </div>
                </div>

                {/* ── Link WhatsApp ── */}
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-1">📲 Link do Grupo <span className="text-gray-400 font-normal">(opcional)</span></label>
                  <input value={form.whatsappLink} onChange={e=>setForm(p=>({...p,whatsappLink:e.target.value}))}
                    onBlur={async e => {
                      const link = e.target.value.trim();
                      if (!link || !form.groupId) return;
                      const g = savedGroups.find(s => s.id === form.groupId);
                      if (g && g.whatsappLink !== link) {
                        const updated = savedGroups.map(s => s.id === form.groupId ? {...s, whatsappLink: link} : s);
                        setSavedGroups(updated);
                        if (g.dbId) await supabase.from('grupos').update({ link_whatsapp: link }).eq('id', g.dbId);
                      }
                    }}
                    placeholder="https://chat.whatsapp.com/…"
                    className="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl text-sm focus:border-green-500 outline-none" />
                  {userProfile?.whatsapp_grupo && form.whatsappLink === userProfile.whatsapp_grupo && (
                    <p className="text-[10px] text-green-600 mt-1">✅ Usando o link do seu perfil</p>
                  )}
                  {userProfile?.whatsapp_grupo && form.whatsappLink !== userProfile.whatsapp_grupo && (
                    <button onClick={()=>setForm(p=>({...p,whatsappLink:userProfile.whatsapp_grupo}))}
                      className="text-[10px] text-green-600 mt-1 hover:underline">
                      ↩ Usar link do meu perfil
                    </button>
                  )}
                </div>

                {/* ── Tipo de Leilão ── */}
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-2">Tipo de Leilão *</label>
                  <div className="space-y-2">
                    {AUCTION_TYPES.map(t=>(
                      <button key={t.id} onClick={()=>setForm(p=>({...p,auctionType:t.id}))}
                        className={`w-full text-left p-3 rounded-xl border-2 transition-all ${form.auctionType===t.id?'border-gray-800 bg-gray-50':'border-gray-200 hover:border-gray-400'}`}>
                        <div className="flex items-center gap-3">
                          <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${form.auctionType===t.id?'border-gray-800':'border-gray-300'}`}>
                            {form.auctionType===t.id && <div className="w-2 h-2 bg-gray-800 rounded-full"></div>}
                          </div>
                          <div>
                            <p className="font-bold text-sm text-gray-800">{t.label}</p>
                            <p className="text-xs text-gray-500">{t.desc}</p>
                          </div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>


                {(!form.date||!form.time||(!form.groupId&&!form.name)) && (
                  <p className="text-xs text-red-400 text-center -mb-1">
                    {!form.name&&!form.groupId ? '⚠️ Preencha o nome do leilão' : (!form.date||!form.time) ? '⚠️ Preencha data e hora' : ''}
                  </p>
                )}
                <button onClick={()=>setStep(2)} disabled={!form.date||!form.time||(!form.groupId&&!form.name)}
                  className="w-full bg-gray-800 text-white py-4 rounded-xl font-bold disabled:opacity-40 hover:bg-gray-900 transition-all">
                  Próximo: Adicionar Cartas →
                </button>
                <button onClick={saveAuction} disabled={!form.date||!form.time||(!form.groupId&&!form.name)}
                  className="w-full bg-white border-2 border-gray-300 text-gray-600 py-3 rounded-xl font-bold text-sm disabled:opacity-40 hover:border-green-400 hover:text-green-600 hover:bg-green-50 transition-all">
                  ✓ Publicar sem cartas
                </button>
              </div>
              );
            })()}

            {/* ══ STEP 2: CARTAS ══ */}
            {step===2 && (
              <div className="p-4 space-y-4">

                {/* Busca de cartas */}
                <div>
                  {/* Linha label + toggle */}
                  <div className="flex items-center justify-between mb-2">
                    <label className="text-xs font-bold text-gray-600">🎴 Adicionar Carta ao Leilão</label>
                    <button
                      onClick={() => setExcluirComunsL(v => !v)}
                      className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold border transition-all ${
                        excluirComunsL
                          ? 'bg-yellow-400 text-gray-900 border-yellow-400'
                          : 'bg-gray-100 text-gray-500 border-gray-300 hover:border-gray-500'
                      }`}>
                      {excluirComunsL ? '✦ Só raras' : '◇ Só raras'}
                    </button>
                    {/* Botão Importar JSON */}
                    <label className="flex items-center gap-1.5 bg-gradient-to-r from-purple-600 to-pink-600 text-white px-3 py-2 rounded-xl text-xs font-bold cursor-pointer hover:from-purple-700 hover:to-pink-700 active:scale-95 transition-all">
                      📥 JSON
                      <input type="file" accept=".json" className="hidden"
                        onChange={e => {
                          const file = e.target.files?.[0];
                          if (!file) return;
                          const reader = new FileReader();
                          reader.onload = (evt) => {
                            try {
                              const cartas = JSON.parse(evt.target.result);
                              if (!Array.isArray(cartas)) { alert('❌ JSON inválido!'); return; }
                              let adicionadas = 0;
                              cartas.forEach(carta => { if (auctionCards.find(c => c.card.id === carta.id)) return; adicionadas++; });
                              setAuctionCards(prev => [...prev, ...cartas.filter(c => !auctionCards.find(ac => ac.card.id === c.id)).map(carta => ({ card: carta, quality: 'NM', language: 'BR', startValue: '', comment: '', ligaPrice: null, ligaLoading: false, pollOptions: ['', '', ''], minBid: '', increment: '' }))]);
                              alert(`✅ ${adicionadas} cartas importadas!`);
                            } catch (error) { alert(`❌ Erro: ${error.message}`); }
                          };
                          reader.readAsText(file);
                          e.target.value = '';
                        }} />
                    </label>
                  </div>
                  <div className="flex gap-2">
                    <input value={cardQuery} onChange={e=>{setCardQuery(e.target.value);searchCards(e.target.value);}}
                      placeholder="Nome da carta, número, edição…"
                      className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-gray-800 outline-none" />
                    {cardLoading && <span className="text-gray-400 text-sm self-center flex-shrink-0">⏳</span>}
                    {/* Botão Escanear — abre câmera traseira direto */}
                    <label className="flex items-center gap-1.5 bg-gray-900 text-white px-3 py-2 rounded-xl text-xs font-bold cursor-pointer hover:bg-gray-700 active:scale-95 transition-all flex-shrink-0">
                      📷 Escanear
                      <input type="file" accept="image/*" capture="environment" className="hidden"
                        onChange={e => {
                          const file = e.target.files?.[0];
                          if (!file) return;
                          const name = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g,' ');
                          setCardQuery(name);
                          searchCards(name);
                          e.target.value = '';
                        }} />
                    </label>
                  </div>

                  {/* Resultados da busca */}
                  {cardResults.length > 0 && (() => {
                    const displayCards = excluirComunsL ? filtrarComuns(cardResults) : cardResults;
                    return (
                    <div className="mt-2 border-2 border-gray-200 rounded-xl overflow-hidden max-h-60 overflow-y-auto shadow-lg">
                      {displayCards.length === 0 ? (
                        <p className="text-center text-xs text-gray-400 py-4">Nenhuma carta rara encontrada. Desative o filtro para ver todas.</p>
                      ) : displayCards.map((card, i) => (
                        <button key={i} onClick={() => addCardToAuction(card)}
                          className="w-full flex items-center gap-3 p-3 hover:bg-yellow-50 border-b last:border-0 text-left transition-all">
                          <img src={card.images?.small} alt={card.name} className="h-24 w-auto object-contain rounded-xl border border-gray-200 shadow-sm flex-shrink-0" onError={e=>e.target.style.display='none'} />
                          <div className="flex-1 min-w-0">
                            <p className="font-bold text-sm text-gray-800 leading-snug">{card.name}</p>
                            {card.namePt && card.namePt !== card.nameEn && (
                              <p className="text-[10px] text-blue-500 font-medium">🇧🇷 {card.namePt}</p>
                            )}
                            <p className="text-xs text-gray-500 mt-0.5">{card.set?.name}</p>
                            <p className="text-[10px] font-mono text-gray-400">{card.number}</p>
                            {card.rarity && <span className="inline-block mt-1 text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full">{card.rarity}</span>}
                          </div>
                          <span className="text-green-500 text-2xl flex-shrink-0">+</span>
                        </button>
                      ))}
                    </div>
                    );
                  })()}
                </div>

                {/* Cartas adicionadas — mais recente no TOPO */}
                {auctionCards.length===0 ? (
                  <div className="text-center py-8 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
                    <p className="text-3xl mb-2">🎴</p>
                    <p className="font-semibold text-gray-500 text-sm">Nenhuma carta adicionada ainda</p>
                    <p className="text-xs text-gray-400">Use a busca acima para adicionar cartas ao leilão</p>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <p className="font-bold text-sm text-gray-700 flex items-center gap-2">
                      {auctionCards.length} carta(s)
                      <span className="text-[10px] text-gray-400 font-normal">— última adicionada aparece primeiro</span>
                    </p>
                    {auctionCards.map(({card,quality,language,startValue,comment,ligaPrice,ligaLoading,pollOptions,minBid,increment},i)=>(
                      <div key={card.id} className={`bg-white border-2 rounded-xl overflow-hidden shadow-sm ${i===0?'border-yellow-400 ring-2 ring-yellow-200':'border-gray-200'}`}>

                        {/* Badge "mais recente" */}
                        {i===0 && (
                          <div className="bg-yellow-400 px-3 py-1">
                            <span className="text-white text-[10px] font-black">✦ ADICIONADA AGORA</span>
                          </div>
                        )}

                        {/* Header da carta */}
                        <div className="flex items-center gap-3 p-3 border-b border-gray-100">
                          <img src={card.images?.large||card.images?.small} alt={card.name}
                            className="h-16 w-auto object-contain rounded-lg border border-gray-200 flex-shrink-0"
                            onError={e=>e.target.style.display='none'} />
                          <div className="flex-1 min-w-0">
                            <p className="font-black text-sm text-gray-800">{card.name}</p>
                            {card.namePt && card.namePt !== card.nameEn && (
                              <p className="text-[10px] text-blue-500 font-medium">🇧🇷 {card.namePt}</p>
                            )}
                            <p className="text-xs text-gray-500">{card.set?.name} · <span className="font-mono">{card.number}</span></p>
                            {card.rarity && <span className="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full">{card.rarity}</span>}
                          </div>
                          <button onClick={()=>removeCard(card.id)}
                            className="w-7 h-7 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-full flex items-center justify-center text-lg flex-shrink-0">✕</button>
                        </div>

                        <div className="p-3 space-y-3">

                          {/* Qualidade */}
                          <div>
                            <label className="text-[10px] font-bold text-gray-500 block mb-1.5">QUALIDADE DA CARTA</label>
                            <div className="flex gap-1.5 flex-wrap">
                              {QUALITIES.map(q=>(
                                <button key={q} onClick={()=>updateCard(card.id,'quality',q)}
                                  className={`px-3 py-1.5 rounded-lg text-xs font-black border-2 transition-all ${quality===q?`${QUALITY_COLOR[q]} text-white border-transparent`:'bg-white text-gray-500 border-gray-200 hover:border-gray-400'}`}>
                                  {q}
                                </button>

    const LiveAuctionRoom = ({ auction, onEnd }) => {
      if (!auction) return null;

      const dataRelativa = (dateStr) => {
  const hoje  = new Date(); hoje.setHours(0,0,0,0);
  const amanha = new Date(hoje); amanha.setDate(hoje.getDate()+1);
  const d = new Date(dateStr + 'T00:00:00'); d.setHours(0,0,0,0);
  const diff = Math.round((d - hoje) / 86400000);
  if (diff === 0) return { label: 'Hoje',    color: 'text-green-600' };
  if (diff === 1) return { label: 'Amanhã',  color: 'text-blue-600'  };
  if (diff === -1) return { label: 'Ontem',  color: 'text-gray-400'  };
  if (diff < 0)   return { label: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), color: 'text-gray-400' };
  if (diff <= 6)  return { label: d.toLocaleDateString('pt-BR',{weekday:'long'}), color: 'text-purple-600' };
  return { label: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), color: 'text-gray-700' };
};

const langFlag = (l) => ({BR:'br',EN:'us',JP:'jp',CN:'cn',KR:'kr',DE:'de',FR:'fr',IT:'it',ES:'es',PT:'pt'}[l]||l?.toLowerCase()||'br');
  const QUALITY_COLOR = { M:'bg-yellow-400',NM:'bg-green-500',SP:'bg-blue-500',MP:'bg-orange-400',HP:'bg-red-500',D:'bg-gray-600' };
  
      // ── FREE: estado linear carta-por-carta ──────────────────────────

      const [timerInput, setTimerInput] = useState('60');

        const s = {};
        cards.forEach((_,i) => { s[i] = 'open'; });
        return s;
      });

      const [pollArremate, setPollArremate] = useState({});

      // ── Compartilhados ────────────────────────────────────────────────

        {user:'Sistema', msg:'Bem-vindo à sala! Aguardando o leiloeiro iniciar.', ts:new Date(), system:true},
      ]);
      const [chatInput,  setChatInput]  = useState('');

      const effectiveMinBid = inlineBid.minBid    || currentCard?.minBid    || '';
      const effectiveInc    = inlineBid.increment || currentCard?.increment  || '';
      const effectivePollOpts = inlineBid.pollOptions.some(Boolean)
        ? inlineBid.pollOptions
        : (currentCard?.pollOptions || []);
  
      // ── Timer countdown (FREE) ───────────────────────────────────────
      useEffect(() => {
        if (phase !== 'bidding' || timer <= 0) return;
        const t = setTimeout(() => setTimer(p => p - 1), 1000);
        return () => clearTimeout(t);
      }, [phase, timer]);
  
      useEffect(() => {
        if (phase === 'bidding' && timer === 0) {
          setChatMsgs(p => [...p, {user:'Sistema', msg:`⏱️ Tempo esgotado! Carta: ${currentCard?.card?.name}`, ts:new Date(), system:true}]);

              const i = parseInt(idx);

  /* ════════════════════════════════════════
     TELA ADMIN - Aprovar Leiloeiros

  const AdminScreen = () => {
    const [pendingAuctioneers, setPendingAuctioneers] = React.useState([]);
    const [loading, setLoading] = React.useState(true);

    const loadPending = async () => {
      setLoading(true);
      try {
        const { data, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('tipo', 'leiloeiro')
          .eq('approved', false)
          .order('created_at', { ascending: false });
        
        if (!error && data) {
          setPendingAuctioneers(data);
        }
      } catch (err) {
        console.error('Erro ao carregar leiloeiros pendentes:', err);
      }
      setLoading(false);
    };

    React.useEffect(() => {
      loadPending();
    }, []);

    const handleApprove = async (userId) => {
      const { error } = await supabase
        .from('profiles')
        .update({ approved: true })
        .eq('id', userId);
      
      if (!error) {
        alert('✅ Leiloeiro aprovado!');
        loadPending();
      } else {
        alert('❌ Erro ao aprovar');
      }
    };

    const handleReject = async (userId) => {
      if (!confirm('Tem certeza que deseja rejeitar este leiloeiro?')) return;
      
      const { error } = await supabase
        .from('profiles')
        .delete()
        .eq('id', userId);
      
      if (!error) {
        alert('❌ Leiloeiro rejeitado');
        loadPending();
      }
    };

    return (
      <div className="min-h-screen bg-gray-50 pokeball-bg pb-24">
        <div className="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-6 pb-8 relative overflow-hidden">

            <div>
              <h1 className="text-2xl font-black" style={{fontFamily:'Arial Black,sans-serif'}}>🔐 Painel Admin</h1>

  const VitrineScreen = () => {
    const QUALITIES_V = ['M','NM','SP','MP','HP','D'];
    const PAGE_SIZE = 24;
    const [cards,        setCards]        = React.useState([]);
    const [loading,      setLoading]      = React.useState(true);
    const [loadingMore,  setLoadingMore]  = React.useState(false);
    const [hasMore,      setHasMore]      = React.useState(true);
    const [page,         setPage]         = React.useState(0);
    const [selCard,      setSelCard]      = React.useState(null);
    const [selVendedor,  setSelVendedor]  = React.useState(null);
    const [sortBy,       setSortBy]       = React.useState('recente'); // recente | menor | maior | az | za
    const [searchQ,      setSearchQ]      = React.useState('');
    const [searching,    setSearching]    = React.useState(false);
    const [myCards,      setMyCards]      = React.useState([]);
    const [showForm,     setShowForm]     = React.useState(false);
    const [publishing,   setPublishing]   = React.useState(false);
    const [whatsapp,     setWhatsapp]     = React.useState(userProfile?.whatsapp || '');
    // cartas sendo montadas para publicar
    const [vitrineCards, setVitrineCards] = React.useState([]);
    const [vCardQuery,   setVCardQuery]   = React.useState('');
    const [vCardResults, setVCardResults] = React.useState([]);
    const [vCardLoading, setVCardLoading] = React.useState(false);
    const vDebounceRef = React.useRef(null);
    const searchDebounceRef = React.useRef(null);

    const canPost = isAuctioneer && isApproved;

    React.useEffect(() => { loadCards(0, true); }, [sortBy]);
    React.useEffect(() => { if (canPost && user) setMyCards(cards.filter(c => c.user_id === user.id)); }, [cards]);

    // Debounce search: se tem query busca tudo de uma vez, senão volta paginado
    React.useEffect(() => {
      if (searchDebounceRef.current) clearTimeout(searchDebounceRef.current);
      if (!searchQ.trim() && !selVendedor) {
        loadCards(0, true);
        return;
      }
      searchDebounceRef.current = setTimeout(() => { searchCards(); }, 400);
    }, [searchQ, selVendedor]);

    const buildQuery = () => {
      let q = supabase.from('vitrine').select('*').eq('ativo', true);
      if (selVendedor) q = q.eq('user_id', selVendedor);
      return q;
    };

    const applySort = (q) => {
      if (sortBy === 'menor') return q.order('price', { ascending: true });
      if (sortBy === 'maior') return q.order('price', { ascending: false });
      if (sortBy === 'az')    return q.order('name',  { ascending: true });
      if (sortBy === 'za')    return q.order('name',  { ascending: false });
      return q.order('created_at', { ascending: false });
    };

    const loadCards = async (pageNum = 0, reset = false) => {
      if (pageNum === 0) setLoading(true); else setLoadingMore(true);
      try {
        const from = pageNum * PAGE_SIZE;
        const to   = from + PAGE_SIZE - 1;
        let q = applySort(buildQuery()).range(from, to);
        const { data, error } = await q;
        if (!error && data) {
          setCards(prev => reset || pageNum === 0 ? data : [...prev, ...data]);
          setHasMore(data.length === PAGE_SIZE);
          setPage(pageNum);
        }
      } catch(e) {}
      setLoading(false);
      setLoadingMore(false);
    };

    const searchCards = async () => {
      setSearching(true);
      try {
        const q = searchQ.trim().toLowerCase();
        // Supabase ilike search — busca no servidor
        let query = supabase.from('vitrine').select('*').eq('ativo', true);
        if (selVendedor) query = query.eq('user_id', selVendedor);
        query = query.or(`name.ilike.%${q}%,set_name.ilike.%${q}%,vendedor.ilike.%${q}%,number.ilike.%${q}%,comment.ilike.%${q}%`);
        query = applySort(query).limit(200);
        const { data } = await query;
        if (data) { setCards(data); setHasMore(false); }
      } catch(e) {}
      setSearching(false);
    };

    const searchVitrineCards = (q) => {
      setVCardQuery(q);
      if (!q.trim()) { setVCardResults([]); return; }
      if (vDebounceRef.current) clearTimeout(vDebounceRef.current);
      vDebounceRef.current = setTimeout(async () => {
        setVCardLoading(true);
        try {
          let found = [];
          try { found = await buscarNoBanco(q.trim()); } catch(e) {}
          if (found.length === 0) found = await tcgdexBuscar(q.trim());
          setVCardResults(found);
        } catch(e) {}
        setVCardLoading(false);
      }, 500);
    };

    const addVitrineCard = (card) => {
      if (vitrineCards.find(c => c.card.id === card.id)) return;
      setVitrineCards(p => [{ card, quality:'NM', language:'BR', price:'', comment:'', graded:false, gradeValue:'', customImg:null, customImgUploading:false }, ...p]);
      setVCardQuery(''); setVCardResults([]);
    };

    const updateVitrineCard = (id, field, val) =>
      setVitrineCards(p => p.map(c => c.card.id === id ? {...c, [field]: val} : c));

    const removeVitrineCard = (id) => setVitrineCards(p => p.filter(c => c.card.id !== id));

    // Adicionar carta pela foto (sem busca)
    const addVitrineCardByPhoto = async (file) => {
      if (!file) return;
      const tempId = 'photo-' + Date.now();
      // Criar objeto carta temporário com a foto
      const objectUrl = URL.createObjectURL(file);
      const tempCard = {
        id: tempId,
        name: '',
        number: '',
        set: { name: '' },
        images: { small: objectUrl, large: objectUrl },
        _photoFile: file, // guardar o arquivo para upload depois
        _isPhotoCard: true,
      };
      setVitrineCards(p => [{ card: tempCard, quality:'NM', language:'BR', price:'', comment:'', graded:false, gradeValue:'', customImg:objectUrl, customImgUploading:false }, ...p]);
      setVCardQuery(''); setVCardResults([]);
    };

    const uploadVitrinePhoto = async (cardId, file) => {
      updateVitrineCard(cardId, 'customImgUploading', true);
      try {
        const ext = file.name.split('.').pop();
        const fileName = `vitrine-${user.id}-${cardId}-${Date.now()}.${ext}`;
        const { error: upErr } = await supabase.storage.from('vitrine').upload(fileName, file, { upsert: true });
        if (upErr) throw new Error(upErr.message);
        const { data: urlData } = supabase.storage.from('vitrine').getPublicUrl(fileName);
        updateVitrineCard(cardId, 'customImg', urlData.publicUrl);
      } catch(e) {
        alert('Erro no upload: ' + e.message);
      }
      updateVitrineCard(cardId, 'customImgUploading', false);
    };

    const handlePublish = async () => {
      if (!whatsapp) { alert('Informe seu WhatsApp'); return; }
      if (vitrineCards.length === 0) { alert('Adicione pelo menos uma carta'); return; }
      if (vitrineCards.some(c => !c.price)) { alert('Defina o preço de todas as cartas'); return; }
      if (vitrineCards.some(c => !c.card.name.trim())) { alert('Digite o nome de todas as cartas'); return; }
      setPublishing(true);
      const vendedor = userProfile?.nome || user?.user_metadata?.display_name || 'Leiloeiro';
      try {
        for (const vc of vitrineCards) {
          let finalImg = vc.customImg || vc.card.images?.large || vc.card.images?.small || null;
          // Se a foto veio de arquivo local (blob:), fazer upload agora
          if (vc.card._photoFile && finalImg?.startsWith('blob:')) {
            try {
              const ext = vc.card._photoFile.name.split('.').pop();
              const fileName = `vitrine-${user.id}-${Date.now()}.${ext}`;
              const { error: upErr } = await supabase.storage.from('vitrine').upload(fileName, vc.card._photoFile, { upsert: true });
              if (!upErr) {
                const { data: urlData } = supabase.storage.from('vitrine').getPublicUrl(fileName);
                finalImg = urlData.publicUrl;
              }
            } catch(e) {}
          }
          const { error } = await supabase.from('vitrine').insert({
            user_id:    user.id,
            vendedor,
            avatar_url: userProfile?.avatar_url || null,
            name:       vc.card.name,
            set_name:   vc.card.set?.name || '',
            number:     vc.card.number || '',
            quality:    vc.quality,
            language:   vc.language,
            price:      parseFloat(vc.price),
            whatsapp,
            img_url:    finalImg,
            comment:    vc.comment || '',
            card_id:    vc.card._isPhotoCard ? '' : (vc.card.id || ''),
            graded:     vc.graded || false,
            grade_value: vc.graded ? (vc.gradeValue || null) : null,
            ativo:      true,
          });
          if (error) { alert('Erro ao publicar ' + vc.card.name + ': ' + error.message); }
        }
        setVitrineCards([]);
        setShowForm(false);
        loadCards(0, true);
      } catch(e) { alert('Erro: ' + e.message); }
      setPublishing(false);
    };

    const handleDelete = async (id) => {
      if (!confirm('Remover esta carta da vitrine?')) return;
      await supabase.from('vitrine').update({ ativo: false }).eq('id', id).eq('user_id', user.id);
      setCards(p => p.filter(c => c.id !== id));
      setMyCards(p => p.filter(c => c.id !== id));
    };

    const vendedores = [...new Map(cards.map(c => [c.user_id, { user_id: c.user_id, vendedor: c.vendedor, avatar_url: c.avatar_url }])).values()];
    const displayCards = cards; // ordenação e filtro feitos no servidor

    return (
      <div className="min-h-screen bg-gray-50 pb-24">
